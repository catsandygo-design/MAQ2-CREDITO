<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Showroom de Unidades | Corretor</title>
  <style>
    :root{--bg:#ecf3fd;--card:#fff;--text:#0f172a;--muted:#475569;--line:rgba(15,23,42,.15);--pri:#0369a1;--ok:#166534;--warn:#92400e;--bad:#991b1b;--rad:16px}
    *{box-sizing:border-box}html,body{height:100%;margin:0}
    body{font-family:Inter,"Segoe UI",system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 500px at 20% -120px,rgba(3,105,161,.15),transparent 70%),linear-gradient(180deg,#ecf3fd,#f8fbff)}
    .wrap{max-width:1680px;margin:0 auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:100%}
    .top,.filters,.kpis,.main{background:var(--card);border:1px solid var(--line);border-radius:var(--rad)}
    .top{padding:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .top h1{margin:0;font-size:30px;line-height:1;color:#0b3c5d}.top p{margin:5px 0 0;color:var(--muted);font-size:14px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-size:13px;color:var(--muted)}
    .btn{border:1px solid var(--line);border-radius:12px;padding:9px 12px;font-weight:800;background:#fff;color:var(--text);text-decoration:none;cursor:pointer}
    .btn.pri{background:#e0f2fe;color:#0c4a6e;border-color:rgba(14,165,233,.35)}.btn.ok{background:#dcfce7;color:var(--ok);border-color:rgba(22,163,74,.34)}.btn.bad{background:#fff1f2;color:#9f1239;border-color:rgba(239,68,68,.35)}
    .filters{padding:10px;display:grid;grid-template-columns:1.3fr 1fr 1fr .8fr .8fr .8fr .7fr;gap:8px;align-items:end}
    .field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;color:var(--muted)}
    .field input,.field select,.field textarea{border:1px solid var(--line);border-radius:11px;padding:9px 10px;background:#fff;color:var(--text);font:inherit}
    .field textarea{min-height:78px}
    .kpis{padding:10px;display:grid;grid-template-columns:repeat(5,minmax(140px,1fr));gap:8px}
    .kpi{border:1px solid var(--line);border-radius:12px;padding:8px}
    .kpi .k{font-size:12px;color:var(--muted)}.kpi .v{font-size:28px;font-weight:900;color:#0b3c5d;line-height:1;margin-top:4px}.kpi .s{font-size:12px;color:var(--muted);margin-top:2px}
    .main{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:0;flex:1}
    .mainHead{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .mainHead h2{margin:0;font-size:22px;color:#0b3c5d}.mainHead p{margin:3px 0 0;color:var(--muted);font-size:13px}.count{border:1px solid var(--line);border-radius:999px;padding:6px 10px;font-size:13px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:9px;overflow:auto;flex:1;min-height:0}
    .unit{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#f8fbff;display:flex;flex-direction:column}
    .hero{height:118px;background:linear-gradient(135deg,#0284c7,#0369a1);position:relative;padding:10px;display:flex;justify-content:space-between;align-items:flex-end;color:#fff}
    .hero.alt1{background:linear-gradient(135deg,#16a34a,#0284c7)}.hero.alt2{background:linear-gradient(135deg,#ea580c,#0284c7)}.hero.alt3{background:linear-gradient(135deg,#2563eb,#0d9488)}
    .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,6,23,.15),rgba(2,6,23,.6))}
    .hero .name,.hero .badge{position:relative;z-index:1}.hero .name{font-size:20px;font-weight:900;line-height:1.05;max-width:72%}
    .badge{border-radius:999px;font-size:11px;font-weight:900;padding:4px 9px;background:#dcfce7;color:var(--ok);border:1px solid rgba(21,128,61,.3)}.badge.warn{background:#fef3c7;color:var(--warn)}.badge.bad{background:#fee2e2;color:var(--bad)}
    .unitBody{padding:9px;display:flex;flex-direction:column;gap:7px}
    .line{display:flex;justify-content:space-between;gap:6px;align-items:flex-start}.emp{font-size:13px;color:#334155;font-weight:700}.price{font-size:22px;font-weight:900;color:#0b3c5d;white-space:nowrap}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}.s{border:1px solid var(--line);border-radius:10px;background:#fff;padding:5px;text-align:center}.s .k{font-size:10px;color:var(--muted)}.s .v{font-size:13px;font-weight:800}
    .desc{font-size:12px;color:var(--muted);line-height:1.3;min-height:32px}
    .actionsRow{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center}.mini{display:flex;gap:6px}
    .mini .b{border:1px solid var(--line);border-radius:999px;background:#fff;padding:5px 9px;font-size:12px;font-weight:800;cursor:pointer}.mini .b.pri{background:#e0f2fe;color:#0c4a6e}.mini .b.ok{background:#dcfce7;color:var(--ok)}
    .sel{border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:800}
    .empty{border:1px dashed rgba(148,163,184,.65);border-radius:12px;padding:20px;background:#f8fbff;text-align:center;color:#475569}
    .drawer{position:fixed;right:14px;bottom:14px;width:min(460px,calc(100vw - 24px));max-height:calc(100vh - 24px);background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 16px 36px rgba(2,6,23,.22);display:none;flex-direction:column;z-index:20;overflow:hidden}
    .drawer.open{display:flex}.drHead{padding:9px 10px;border-bottom:1px solid var(--line);background:#f1f5f9;display:flex;justify-content:space-between;align-items:center}
    .drBody{padding:9px;overflow:auto;display:grid;grid-template-columns:1fr 1fr;gap:7px}.drBody .field.full{grid-column:1/-1}
    .drAct{padding:9px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
    .modalBg{position:fixed;inset:0;background:rgba(2,6,23,.55);display:none;align-items:center;justify-content:center;z-index:25;padding:10px}.modalBg.open{display:flex}
    .modal{width:min(920px,100%);max-height:calc(100vh - 20px);overflow:auto;background:#fff;border:1px solid rgba(148,163,184,.45);border-radius:14px;padding:12px}
    .modal h3{margin:0;font-size:26px;color:#0b3c5d}.modal .meta{margin-top:4px;color:var(--muted)}
    .mgrid{margin-top:9px;display:grid;grid-template-columns:1.2fr 1fr;gap:9px}.imgBox{border:1px solid var(--line);border-radius:10px;min-height:230px;background:linear-gradient(135deg,#dbeafe,#cffafe);overflow:hidden}.imgBox img{width:100%;height:100%;object-fit:cover}
    .det{border:1px solid var(--line);border-radius:10px;background:#f8fbff;padding:9px;display:grid;gap:6px;font-size:14px}.drow{display:flex;justify-content:space-between;gap:8px;border-bottom:1px dashed rgba(148,163,184,.45);padding-bottom:5px}
    .mact{margin-top:9px;display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}
    .cmp{margin-top:9px;width:100%;border-collapse:collapse}.cmp th,.cmp td{border:1px solid var(--line);padding:7px;font-size:13px;text-align:left}.cmp th{background:#e2e8f0;color:#334155;font-size:11px;text-transform:uppercase}
    .flash{display:none;position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:9px 14px;border-radius:999px;font-size:13px;z-index:40;border:1px solid transparent}
    .flash.ok{display:block;background:#dcfce7;color:var(--ok);border-color:rgba(22,163,74,.36)}.flash.err{display:block;background:#fee2e2;color:var(--bad);border-color:rgba(220,38,38,.36)}
    .cmpBar{position:fixed;left:50%;transform:translateX(-50%);bottom:10px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 7px 7px 12px;display:none;align-items:center;gap:7px;z-index:30;box-shadow:0 12px 24px rgba(2,6,23,.2)}
    .cmpBar.open{display:flex}.cmpBar .t{font-size:13px;color:#334155;font-weight:700}
    @media (max-width:1500px){.filters{grid-template-columns:1fr 1fr 1fr 1fr}.kpis{grid-template-columns:repeat(3,minmax(140px,1fr))}}
    @media (max-width:980px){.top h1{font-size:24px}.kpis{grid-template-columns:repeat(2,minmax(140px,1fr))}.mgrid{grid-template-columns:1fr}}
    @media (max-width:760px){.filters{grid-template-columns:1fr}.kpis{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.drBody{grid-template-columns:1fr}.actions{width:100%}.actions .btn{flex:1 1 auto}}
  </style>
  <link rel="stylesheet" href="/assets/theme_techboard.css" />
</head>
<body class="tech-commercial">
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Showroom de Unidades</h1>
        <p>Tela profissional para apresentar unidades disponiveis durante o atendimento.</p>
      </div>
      <div class="actions">
        <span class="chip">Auto refresh: <strong id="refreshLabel">30s</strong></span>
        <button class="btn ok" id="btnOpenDrawer" type="button">Cadastrar unidade</button>
        <a class="btn" href="/app/corretor/precadastro">Pre-cadastro</a>
        <a class="btn" href="/app/corretor">Voltar painel</a>
        <button class="btn bad" id="btnLogout" type="button">Sair</button>
      </div>
    </header>

    <section class="filters">
      <div class="field"><label>Busca livre</label><input id="fQ" placeholder="Empreendimento, unidade, tipologia..." /></div>
      <div class="field"><label>Empreendimento</label><input id="fEmp" list="empreendimentosList" placeholder="Todos" /><datalist id="empreendimentosList"></datalist></div>
      <div class="field"><label>Tipologia</label><input id="fTip" placeholder="2 quartos, 3 quartos..." /></div>
      <div class="field"><label>Status</label><select id="fStatus"></select></div>
      <div class="field"><label>Quartos min.</label><input id="fQMin" type="number" min="0" max="20" placeholder="0" /></div>
      <div class="field"><label>Preco max. (R$)</label><input id="fPMax" type="number" min="0" step="1000" /></div>
      <div class="field"><label>&nbsp;</label><button class="btn pri" id="btnFiltrar" type="button">Filtrar</button><label style="font-size:12px;color:#475569;margin-top:4px"><input type="checkbox" id="ckDisp" checked /> Somente disponiveis</label></div>
    </section>

    <section class="kpis" id="kpis"></section>

    <section class="main">
      <div class="mainHead">
        <div><h2>Unidades para apresentacao</h2><p>Use detalhes e comparacao para conduzir a conversa com o cliente.</p></div>
        <span class="count" id="countInfo">0 unidade(s)</span>
      </div>
      <div class="grid" id="grid"></div>
    </section>
  </div>

  <div class="drawer" id="drawer">
    <div class="drHead"><strong>Cadastro rapido de unidade</strong><button class="btn" id="btnCloseDrawer" type="button">Fechar</button></div>
    <form id="unitForm">
      <div class="drBody">
        <div class="field full"><label>Empreendimento *</label><input id="uEmp" list="empreendimentosList" required /></div>
        <div class="field"><label>Unidade *</label><input id="uUni" required placeholder="Ex.: 302" /></div>
        <div class="field"><label>Bloco/Torre</label><input id="uBlo" /></div>
        <div class="field full"><label>Tipologia</label><input id="uTip" /></div>
        <div class="field"><label>Quartos</label><input id="uQua" type="number" min="0" max="20" /></div>
        <div class="field"><label>Banheiros</label><input id="uBan" type="number" min="0" max="20" /></div>
        <div class="field"><label>Vagas</label><input id="uVag" type="number" min="0" max="20" /></div>
        <div class="field"><label>Area m²</label><input id="uAre" type="number" min="0" step="0.1" /></div>
        <div class="field full"><label>Valor R$</label><input id="uVal" type="number" min="0" step="1000" /></div>
        <div class="field full"><label>Localizacao</label><input id="uLoc" placeholder="Andar alto, vista livre..." /></div>
        <div class="field full"><label>Diferenciais</label><textarea id="uDif"></textarea></div>
        <div class="field full"><label>URL de imagem</label><input id="uImg" placeholder="https://..." /></div>
        <div class="field"><label>Status</label><select id="uSta"></select></div>
        <div class="field"><label style="font-size:12px;color:#475569"><input type="checkbox" id="uVis" checked /> Visita disponivel</label></div>
      </div>
      <div class="drAct"><button class="btn" type="button" id="btnResetForm">Limpar</button><button class="btn ok" type="submit">Salvar</button></div>
    </form>
  </div>

  <div class="modalBg" id="detBg"><div class="modal" id="detModal"></div></div>
  <div class="modalBg" id="cmpBg"><div class="modal" id="cmpModal"></div></div>
  <div class="cmpBar" id="cmpBar"><span class="t" id="cmpText">0 selecionadas</span><button class="btn pri" id="btnOpenCmp" type="button">Comparar</button><button class="btn" id="btnClearCmp" type="button">Limpar</button></div>
  <div class="flash" id="flash"></div>

  <script>
    const API="/app/api/corretor/unidades",REF=30,DEF=["DISPONIVEL","RESERVADA","VENDIDA","BLOQUEADA"],LBL={DISPONIVEL:"Disponivel",RESERVADA:"Reservada",VENDIDA:"Vendida",BLOQUEADA:"Bloqueada"},BADGE={DISPONIVEL:"",RESERVADA:"warn",VENDIDA:"bad",BLOQUEADA:"bad"};
    let statuses=[...DEF],rows=[],sel=new Set(),count=REF,loading=false; const $=id=>document.getElementById(id),norm=v=>String(v||"").trim().toLowerCase();
    $("refreshLabel").textContent=`${count}s`;
    const esc=v=>String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;");
    const n=v=>{const x=Number(v); return Number.isFinite(x)?x:null}; const i=v=>{const x=Number(v); return Number.isInteger(x)?x:null};
    const money=v=>{const x=Number(v); if(!Number.isFinite(x)||x<=0)return "-"; return x.toLocaleString("pt-BR",{style:"currency",currency:"BRL",maximumFractionDigits:0})};
    const area=v=>{const x=Number(v); if(!Number.isFinite(x)||x<=0)return "-"; return `${x.toLocaleString("pt-BR",{maximumFractionDigits:1})} m²`};
    const st=v=>{const k=String(v||"").trim().toUpperCase(); return LBL[k]||k||"-"};
    function flash(msg,err=false){const el=$("flash"); el.textContent=msg; el.className=`flash ${err?"err":"ok"}`; setTimeout(()=>{if(el.textContent===msg){el.className="flash";el.textContent=""}},3000)}
    function alt(seed){let h=0;const s=String(seed||""); for(let k=0;k<s.length;k++)h=((h<<5)-h+s.charCodeAt(k))|0; const m=Math.abs(h)%4; return m===0?"":`alt${m}`}
    async function api(path="",opt={}){const r=await fetch(`${API}${path}`,{credentials:"same-origin",headers:{"Content-Type":"application/json",...(opt.headers||{})},...opt}); if(r.status===401){location.href="/login"; throw new Error("Nao autenticado")} const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.detail||"Falha na requisicao"); return d}
    async function session(){const r=await fetch("/auth/me",{credentials:"same-origin"}); if(r.status===401){location.href="/login"; throw new Error("Nao autenticado")} const d=await r.json().catch(()=>({})); if(!r.ok) throw new Error(d.detail||"Falha de sessao"); if(norm(d.role)!=="corretor"){location.href="/app"; throw new Error("Perfil sem acesso")}}
    async function emps(){const r=await fetch("/app/api/empreendimentos",{credentials:"same-origin"}); if(!r.ok)return; const d=await r.json().catch(()=>[]); if(!Array.isArray(d))return; $("empreendimentosList").innerHTML=d.map(x=>`<option value="${esc(x.nome||"")}"></option>`).join("")}
    async function sts(){const r=await fetch("/app/api/corretor/unidades/status",{credentials:"same-origin"}); if(r.ok){const d=await r.json().catch(()=>({})); if(Array.isArray(d.status)&&d.status.length) statuses=d.status.map(s=>String(s||"").trim().toUpperCase()).filter(Boolean)} const ops=statuses.map(s=>`<option value="${esc(s)}">${esc(st(s))}</option>`).join(""); $("uSta").innerHTML=ops; $("fStatus").innerHTML=`<option value="">Todos</option>${ops}`}
    function q(){const p=new URLSearchParams(); const v=(id)=>$(id).value.trim(); if(v("fQ"))p.set("q",v("fQ")); if(v("fEmp"))p.set("empreendimento",v("fEmp")); if(v("fTip"))p.set("tipologia",v("fTip")); if(v("fStatus"))p.set("status",v("fStatus")); if(v("fQMin"))p.set("quartos_min",v("fQMin")); if(v("fPMax"))p.set("preco_max",v("fPMax")); p.set("somente_disponiveis",$("ckDisp").checked?"true":"false"); p.set("limit","500"); return p.toString()}
    function kpis(m){$("kpis").innerHTML=`<div class="kpi"><div class="k">Total de unidades</div><div class="v">${Number(m?.total||0)}</div><div class="s">base completa</div></div><div class="kpi"><div class="k">Disponiveis</div><div class="v">${Number(m?.disponiveis||0)}</div><div class="s">estoque aberto</div></div><div class="kpi"><div class="k">Ticket medio</div><div class="v" style="font-size:22px">${esc(money(m?.ticket_medio))}</div><div class="s">somente disponiveis</div></div><div class="kpi"><div class="k">Area media</div><div class="v">${Number(m?.area_media||0).toLocaleString("pt-BR",{maximumFractionDigits:1})}</div><div class="s">m²</div></div><div class="kpi"><div class="k">Empreendimentos</div><div class="v">${Number(m?.empreendimentos||0)}</div><div class="s">${rows.length} na tela</div></div>`}
    function card(u){const id=String(u.id||""),selOn=sel.has(id),s=String(u.status_unidade||"").toUpperCase(),sops=statuses.map(x=>`<option value="${esc(x)}" ${s===x?"selected":""}>${esc(st(x))}</option>`).join(""); return `<article class="unit"><div class="hero ${alt(`${u.empreendimento||""}-${u.unidade||""}`)}">${u.url_imagem?`<img src="${esc(u.url_imagem)}" alt="Unidade ${esc(u.unidade||"")}" loading="lazy" />`:""}<div class="name">${esc(u.unidade||"-")}</div><span class="badge ${BADGE[s]||""}">${esc(st(s))}</span></div><div class="unitBody"><div class="line"><div class="emp">${esc(u.empreendimento||"-")} ${u.bloco?`• ${esc(u.bloco)}`:""}</div><div class="price">${esc(money(u.valor))}</div></div><div class="stats"><div class="s"><div class="k">Quartos</div><div class="v">${u.quartos??"-"}</div></div><div class="s"><div class="k">Banheiros</div><div class="v">${u.banheiros??"-"}</div></div><div class="s"><div class="k">Vagas</div><div class="v">${u.vagas??"-"}</div></div><div class="s"><div class="k">Area</div><div class="v">${esc(area(u.area_m2))}</div></div></div><div class="desc">${esc(u.diferenciais||u.localizacao||"Unidade pronta para apresentacao comercial.")}</div><div class="actionsRow"><div class="mini"><button class="b pri" data-a="det" data-id="${esc(id)}">Detalhes</button><button class="b ${selOn?"ok":""}" data-a="cmp" data-id="${esc(id)}">${selOn?"Selecionada":"Comparar"}</button></div><select class="sel" data-a="sta" data-id="${esc(id)}">${sops}</select></div></div></article>`}
    function cmpBar(){const c=sel.size; $("cmpText").textContent=`${c} selecionada(s) para comparacao`; $("cmpBar").classList.toggle("open",c>0)}
    function grid(){ $("countInfo").textContent=`${rows.length} unidade(s)`; const g=$("grid"); if(!rows.length){g.innerHTML='<div class="empty">Nenhuma unidade encontrada. Ajuste os filtros ou cadastre novas unidades.</div>'; return;} g.innerHTML=rows.map(card).join("")}
    function emailMsg(u){const l=[`Unidade ${u.unidade||"-"}`,`Empreendimento: ${u.empreendimento||"-"}`,`Tipologia: ${u.tipologia||"-"}`,`Quartos: ${u.quartos??"-"}`,`Area: ${area(u.area_m2)}`,`Valor: ${money(u.valor)}`]; if(u.localizacao)l.push(`Localizacao: ${u.localizacao}`); if(u.diferenciais)l.push(`Diferenciais: ${u.diferenciais}`); return l.join("\n")}
    function emailHref(u){const subject=`Unidade ${u.unidade||"-"} - ${u.empreendimento||"-"}`; return `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(emailMsg(u))}`}
    function openDet(id){const u=rows.find(x=>String(x.id)===String(id)); if(!u)return; const s=String(u.status_unidade||"").toUpperCase(); $("detModal").innerHTML=`<h3>${esc(u.unidade||"-")} • ${esc(u.empreendimento||"-")}</h3><div class="meta">${esc(u.tipologia||"Tipologia nao informada")} ${u.bloco?`• ${esc(u.bloco)}`:""}</div><div class="mgrid"><div class="imgBox">${u.url_imagem?`<img src="${esc(u.url_imagem)}" alt="Imagem unidade ${esc(u.unidade||"")}" />`:""}</div><div class="det"><div class="drow"><span>Status</span><strong>${esc(st(s))}</strong></div><div class="drow"><span>Valor</span><strong>${esc(money(u.valor))}</strong></div><div class="drow"><span>Area</span><strong>${esc(area(u.area_m2))}</strong></div><div class="drow"><span>Quartos</span><strong>${u.quartos??"-"}</strong></div><div class="drow"><span>Banheiros</span><strong>${u.banheiros??"-"}</strong></div><div class="drow"><span>Vagas</span><strong>${u.vagas??"-"}</strong></div><div class="drow"><span>Localizacao</span><strong>${esc(u.localizacao||"-")}</strong></div><div class="drow"><span>Visita</span><strong>${u.visita_disponivel?"Disponivel":"Indisponivel"}</strong></div></div></div><p style="margin-top:9px;color:#334155;font-size:14px;line-height:1.4"><strong>Diferenciais:</strong> ${esc(u.diferenciais||"Nao informado.")}</p><div class="mact"><a class="btn pri" href="${esc(emailHref(u))}">Enviar por e-mail</a><button class="btn" data-a="close-det" type="button">Fechar</button></div>`; $("detBg").classList.add("open")}
    function openCmp(){const s=rows.filter(x=>sel.has(String(x.id))); if(!s.length){flash("Selecione ao menos uma unidade para comparar.",true); return;} const h=s.map(u=>`<th>${esc(u.unidade||"-")}<br/><span style="font-weight:600;color:#64748b">${esc(u.empreendimento||"-")}</span></th>`).join(""); const l=(k,f)=>`<tr><th>${esc(k)}</th>${s.map(u=>`<td>${esc(f(u))}</td>`).join("")}</tr>`; $("cmpModal").innerHTML=`<h3>Comparativo de unidades</h3><div class="meta">Compare ate 3 opcoes lado a lado.</div><table class="cmp"><thead><tr><th>Atributo</th>${h}</tr></thead><tbody>${l("Status",u=>st(u.status_unidade))}${l("Tipologia",u=>u.tipologia||"-")}${l("Quartos",u=>String(u.quartos??"-"))}${l("Banheiros",u=>String(u.banheiros??"-"))}${l("Vagas",u=>String(u.vagas??"-"))}${l("Area",u=>area(u.area_m2))}${l("Valor",u=>money(u.valor))}${l("Localizacao",u=>u.localizacao||"-")}${l("Diferenciais",u=>u.diferenciais||"-")}</tbody></table><div class="mact"><button class="btn" data-a="close-cmp" type="button">Fechar</button></div>`; $("cmpBg").classList.add("open")}
    async function load(force=false){if(loading)return; if(!force&&document.hidden)return; loading=true; try{const [d,m]=await Promise.all([api(`?${q()}`),api("/metricas")]); rows=Array.isArray(d)?d:[]; kpis(m); grid(); [...sel].forEach(id=>{if(!rows.some(x=>String(x.id)===id))sel.delete(id)}); cmpBar()}catch(e){$("grid").innerHTML=`<div class="empty" style="color:#991b1b">Erro ao carregar unidades: ${esc(e.message)}</div>`}finally{loading=false}}
    async function save(ev){ev.preventDefault(); const p={empreendimento:$("uEmp").value.trim(),unidade:$("uUni").value.trim(),bloco:$("uBlo").value.trim()||null,tipologia:$("uTip").value.trim()||null,quartos:i($("uQua").value),banheiros:i($("uBan").value),vagas:i($("uVag").value),area_m2:n($("uAre").value),valor:n($("uVal").value),localizacao:$("uLoc").value.trim()||null,diferenciais:$("uDif").value.trim()||null,url_imagem:$("uImg").value.trim()||null,status_unidade:$("uSta").value||"DISPONIVEL",visita_disponivel:$("uVis").checked}; if(!p.empreendimento||!p.unidade){flash("Informe empreendimento e unidade.",true); return;} try{await api("",{method:"POST",body:JSON.stringify(p)}); flash("Unidade cadastrada com sucesso."); $("unitForm").reset(); $("uSta").value="DISPONIVEL"; $("uVis").checked=true; await load(true)}catch(e){flash(e.message||"Falha ao cadastrar unidade.",true)}}
    async function upd(id,s){try{await api(`/${encodeURIComponent(id)}`,{method:"PATCH",body:JSON.stringify({status_unidade:s})}); flash("Status atualizado."); await load(true)}catch(e){flash(e.message||"Falha ao atualizar status.",true)}}
    async function clickGrid(ev){const t=ev.target; if(!(t instanceof HTMLElement))return; const a=t.getAttribute("data-a"),id=t.getAttribute("data-id"); if(!a||!id)return; if(a==="det")openDet(id); else if(a==="cmp"){if(sel.has(id))sel.delete(id); else {if(sel.size>=3){flash("Maximo de 3 unidades na comparacao.",true); return;} sel.add(id)} grid(); cmpBar()}}
    async function changeGrid(ev){const t=ev.target; if(!(t instanceof HTMLSelectElement))return; if(t.getAttribute("data-a")!=="sta")return; const id=t.getAttribute("data-id"); if(!id)return; await upd(id,t.value)}
    function closeDet(ev){if(!ev||ev.target===$("detBg")||(ev.target instanceof HTMLElement&&ev.target.getAttribute("data-a")==="close-det"))$("detBg").classList.remove("open")}
    function closeCmp(ev){if(!ev||ev.target===$("cmpBg")||(ev.target instanceof HTMLElement&&ev.target.getAttribute("data-a")==="close-cmp"))$("cmpBg").classList.remove("open")}
    const openDrawer=()=>$("drawer").classList.add("open"), closeDrawer=()=>$("drawer").classList.remove("open");
    async function logout(){await fetch("/auth/logout",{method:"POST",credentials:"same-origin"}).catch(()=>null); location.href="/login"}
    function tick(){if(document.hidden){$("refreshLabel").textContent="pausado"; return;} count-=1; if(count<=0){count=REF; load().catch(()=>null)} $("refreshLabel").textContent=`${count}s`}
    function bind(){ $("btnFiltrar").addEventListener("click",()=>load(true)); ["fQ","fEmp","fTip","fQMin","fPMax"].forEach(id=>$(id).addEventListener("keydown",(ev)=>{if(ev.key==="Enter"){ev.preventDefault(); load(true).catch(()=>null)}})); $("fStatus").addEventListener("change",()=>load(true)); $("ckDisp").addEventListener("change",()=>load(true)); $("grid").addEventListener("click",clickGrid); $("grid").addEventListener("change",changeGrid); $("btnOpenDrawer").addEventListener("click",openDrawer); $("btnCloseDrawer").addEventListener("click",closeDrawer); $("btnResetForm").addEventListener("click",()=>{$("unitForm").reset(); $("uSta").value="DISPONIVEL"; $("uVis").checked=true}); $("unitForm").addEventListener("submit",save); $("btnLogout").addEventListener("click",logout); $("detBg").addEventListener("click",closeDet); $("cmpBg").addEventListener("click",closeCmp); $("cmpModal").addEventListener("click",closeCmp); $("btnOpenCmp").addEventListener("click",openCmp); $("btnClearCmp").addEventListener("click",()=>{sel.clear(); grid(); cmpBar()}); document.addEventListener("visibilitychange",()=>{if(!document.hidden){count=REF; load(true).catch(()=>null)}}); document.addEventListener("keydown",(ev)=>{if(ev.key==="Escape"){closeDet();closeCmp();closeDrawer()}})}
    async function boot(){await session(); await Promise.all([sts(),emps()]); bind(); await load(true); setInterval(tick,1000)}
    boot().catch(e=>flash(e.message||"Falha ao carregar tela de apresentacao.",true));
  </script>
</body>
</html>
