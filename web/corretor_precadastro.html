<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pre-cadastro de Leads | Corretor</title>
  <style>
    :root{
      --bg:#eef3fa;
      --bg2:#e8eef8;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --line:rgba(15,23,42,.16);
      --primary:#0284c7;
      --primary-soft:#e0f2fe;
      --success:#16a34a;
      --danger:#dc2626;
      --warn:#d97706;
      --radius:16px;
      --shadow:0 8px 24px rgba(15,23,42,.06);
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%}
    body{
      font-family: Inter, "Segoe UI", system-ui, -apple-system, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg),var(--bg2));
    }
    .wrap{
      height:100%;
      max-width:1680px;
      margin:0 auto;
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .top{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      box-shadow:var(--shadow);
    }
    .top h1{margin:0;font-size:22px;line-height:1.1}
    .top p{margin:4px 0 0;color:var(--muted);font-size:14px}
    .actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .chip{
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:var(--muted);
      font-size:13px;
      padding:8px 12px;
    }
    .btn{
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      color:var(--text);
      text-decoration:none;
      font-weight:700;
      padding:10px 14px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }
    .btn.primary{
      border-color:rgba(14,165,233,.38);
      background:var(--primary-soft);
      color:#075985;
    }
    .btn.success{
      border-color:rgba(22,163,74,.38);
      background:#dcfce7;
      color:#166534;
    }
    .btn.danger{
      border-color:rgba(239,68,68,.42);
      background:#fee2e2;
      color:#991b1b;
    }
    .grid{
      flex:1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns:430px 1fr;
      gap:12px;
    }
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      box-shadow:var(--shadow);
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .panel h2{margin:0;font-size:20px;line-height:1.1}
    .sub{color:var(--muted);font-size:13px}
    .fields{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .field{display:flex;flex-direction:column;gap:6px}
    .field.full{grid-column:1 / -1}
    .field label{font-size:13px;color:var(--muted)}
    .field input,.field select,.field textarea{
      border:1px solid var(--line);
      border-radius:12px;
      background:#fff;
      color:var(--text);
      padding:10px 11px;
      font:inherit;
      outline:none;
    }
    .field textarea{min-height:88px;resize:vertical}
    .field input:focus,.field select:focus,.field textarea:focus{
      border-color:rgba(14,165,233,.45);
      box-shadow:0 0 0 4px rgba(14,165,233,.12);
    }
    .formActions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }
    .flash{
      display:none;
      border-radius:12px;
      font-size:13px;
      padding:10px 12px;
      border:1px solid transparent;
    }
    .flash.ok{
      display:block;
      border-color:rgba(22,163,74,.38);
      background:#dcfce7;
      color:#166534;
    }
    .flash.err{
      display:block;
      border-color:rgba(239,68,68,.4);
      background:#fee2e2;
      color:#991b1b;
    }
    .rightTop{
      display:grid;
      grid-template-columns:1.3fr 1fr 1fr .8fr .8fr;
      gap:10px;
      align-items:end;
    }
    .stages{
      display:grid;
      grid-template-columns:repeat(3, minmax(160px, 1fr));
      gap:8px;
    }
    .stageCard{
      border:1px solid var(--line);
      border-radius:12px;
      padding:9px 10px;
      background:#f8fbff;
      min-height:70px;
    }
    .stageCard .k{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.03em;
    }
    .stageCard .v{
      margin-top:6px;
      font-size:22px;
      font-weight:800;
      color:#0c4a6e;
    }
    .tableWrap{
      border:1px solid var(--line);
      border-radius:14px;
      overflow:auto;
      flex:1 1 auto;
      min-height:0;
      background:#fff;
    }
    table{width:100%;border-collapse:collapse;table-layout:fixed}
    th,td{
      border-bottom:1px solid rgba(148,163,184,.2);
      padding:9px 10px;
      text-align:left;
      vertical-align:top;
    }
    th{
      position:sticky;
      top:0;
      z-index:1;
      background:#e2e8f0;
      color:#334155;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.05em;
    }
    td{font-size:13px}
    td .main{font-weight:800;font-size:18px;line-height:1.15}
    td .meta{margin-top:3px;color:var(--muted)}
    .rowTools{display:flex;gap:6px;flex-wrap:wrap}
    .miniBtn{
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      color:#0f172a;
      font-size:12px;
      font-weight:700;
      padding:4px 10px;
      cursor:pointer;
    }
    .miniBtn.primary{border-color:rgba(14,165,233,.35);background:#e0f2fe;color:#0c4a6e}
    .miniBtn.success{border-color:rgba(22,163,74,.35);background:#dcfce7;color:#166534}
    .miniSel{
      border:1px solid var(--line);
      border-radius:999px;
      padding:4px 10px;
      font-size:12px;
      font-weight:700;
      background:#fff;
      max-width:170px;
    }
    .muted{color:var(--muted)}
    @media (max-width:1400px){
      .grid{grid-template-columns:1fr}
      .rightTop{grid-template-columns:1fr 1fr}
      .stages{grid-template-columns:repeat(2,minmax(140px,1fr))}
    }
    @media (max-width:760px){
      .rightTop,.fields,.stages{grid-template-columns:1fr}
      .top{flex-direction:column;align-items:flex-start}
      .actions{width:100%}
      .actions .btn{flex:1 1 auto}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div>
        <h1>Pre-cadastro de Leads</h1>
        <p>Cadastro inicial do cliente e acompanhamento dos estagios de atendimento.</p>
      </div>
      <div class="actions">
        <span class="chip">Auto refresh: <strong id="refreshLabel">30s</strong></span>
        <a class="btn" href="/app/corretor">Voltar painel</a>
        <button class="btn danger" id="btnLogout" type="button">Sair</button>
      </div>
    </header>

    <main class="grid">
      <section class="panel">
        <div>
          <h2 id="formTitle">Novo pre-cadastro</h2>
          <div class="sub">Preencha os dados do cliente, interesse e agenda.</div>
        </div>
        <div id="flash" class="flash"></div>
        <form id="leadForm" autocomplete="off">
          <div class="fields">
            <div class="field full">
              <label for="nomeCliente">Nome do cliente *</label>
              <input id="nomeCliente" required placeholder="Nome completo do cliente" />
            </div>
            <div class="field">
              <label for="telefone">Telefone</label>
              <input id="telefone" placeholder="(67) 99999-9999" />
            </div>
            <div class="field">
              <label for="whatsapp">WhatsApp</label>
              <input id="whatsapp" placeholder="(67) 99999-9999" />
            </div>
            <div class="field full">
              <label for="email">E-mail</label>
              <input id="email" type="email" placeholder="cliente@email.com" />
            </div>
            <div class="field">
              <label for="cpf">CPF</label>
              <input id="cpf" placeholder="Somente numeros" />
            </div>
            <div class="field">
              <label for="documentoIdentificacao">RG / CNH</label>
              <input id="documentoIdentificacao" placeholder="Numero do RG ou CNH" />
            </div>
            <div class="field">
              <label for="estadoCivil">Estado civil</label>
              <select id="estadoCivil">
                <option value="">Nao informado</option>
                <option value="SOLTEIRO">Solteiro(a)</option>
                <option value="CASADO">Casado(a)</option>
                <option value="DIVORCIADO">Divorciado(a)</option>
                <option value="VIUVO">Viuvo(a)</option>
                <option value="UNIAO_ESTAVEL">Uniao estavel</option>
              </select>
            </div>
            <div class="field">
              <label for="certidaoNumero">N. certidao (casado)</label>
              <input id="certidaoNumero" placeholder="Numero da certidao" />
            </div>
            <div class="field">
              <label for="cidadeNascimento">Cidade de nascimento</label>
              <input id="cidadeNascimento" placeholder="Cidade de nascimento" />
            </div>
            <div class="field">
              <label for="dataNascimento">Data de nascimento</label>
              <input id="dataNascimento" type="date" />
            </div>
            <div class="field full">
              <label for="endereco">Endereco</label>
              <input id="endereco" placeholder="Endereco completo" />
            </div>
            <div class="field full">
              <label for="empreendimento">Empreendimento de interesse</label>
              <input id="empreendimento" list="empreendimentosList" placeholder="Ex.: AGL32 - Vila Margarida" />
              <datalist id="empreendimentosList"></datalist>
            </div>
            <div class="field full">
              <label for="localidade">Localidade de interesse</label>
              <input id="localidade" placeholder="Bairro/cidade/regiao de interesse" />
            </div>
            <div class="field">
              <label for="localAgendamento">Local de agendamento</label>
              <input id="localAgendamento" placeholder="Ex.: Stand de vendas AGL32" />
            </div>
            <div class="field">
              <label for="tipoVisita">Tipo de visita</label>
              <select id="tipoVisita">
                <option value="">Nao definido</option>
                <option value="ONLINE">Online</option>
                <option value="PRESENCIAL">Presencial</option>
                <option value="HIBRIDA">Hibrida</option>
              </select>
            </div>
            <div class="field">
              <label for="dataAgendamento">Data e hora do agendamento</label>
              <input id="dataAgendamento" type="datetime-local" />
            </div>
            <div class="field">
              <label for="estagioLead">Estagio do lead</label>
              <select id="estagioLead"></select>
            </div>
            <div class="field">
              <label for="decisaoCca">Decisao CCA</label>
              <select id="decisaoCca">
                <option value="EM_ANALISE">Em analise</option>
                <option value="APROVADO">Aprovado</option>
                <option value="CONDICIONADO">Condicionado</option>
                <option value="REPROVADO">Reprovado</option>
                <option value="BLOQUEADO">Bloqueado</option>
                <option value="DAR_QV">Dar QV</option>
              </select>
            </div>
            <div class="field">
              <label for="contratoAssinado">Contrato assinado</label>
              <select id="contratoAssinado">
                <option value="false">Nao</option>
                <option value="true">Sim</option>
              </select>
            </div>
            <div class="field">
              <label for="ultimoContato">Ultimo contato</label>
              <input id="ultimoContato" type="datetime-local" />
            </div>
            <div class="field full">
              <label for="observacoes">Observacoes de atendimento</label>
              <textarea id="observacoes" placeholder="Resumo do atendimento, proximo passo, pendencias do lead..."></textarea>
            </div>
          </div>
          <div class="formActions">
            <button class="btn success" type="submit" id="btnSalvar">Salvar pre-cadastro</button>
            <button class="btn" type="button" id="btnNovo">Novo cadastro</button>
          </div>
        </form>
      </section>

      <section class="panel">
        <div class="rightTop">
          <div class="field">
            <label for="filtroQ">Buscar cliente/contato/local</label>
            <input id="filtroQ" placeholder="Ex.: Maria, 67..., Jardim..." />
          </div>
          <div class="field">
            <label for="filtroEmp">Empreendimento</label>
            <input id="filtroEmp" placeholder="Ex.: AGL32" />
          </div>
          <div class="field">
            <label for="filtroLoc">Localidade</label>
            <input id="filtroLoc" placeholder="Ex.: Vila Margarida" />
          </div>
          <div class="field">
            <label for="filtroStage">Estagio</label>
            <select id="filtroStage"></select>
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button class="btn primary" id="btnFiltrar" type="button">Filtrar</button>
          </div>
        </div>

        <div class="stages" id="stages"></div>

        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th style="width:28%">Cliente</th>
                <th style="width:20%">Contato</th>
                <th style="width:22%">Interesse / Agendamento</th>
                <th style="width:16%">Estagio</th>
                <th style="width:14%">Acoes</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    const API_BASE = "/app/api/corretor/pre-cadastros";
    const REFRESH_SECONDS = 30;
    const STAGE_LABELS = {
      LEAD: "Lead (SDR)",
      AGENDAMENTO: "Agendamento",
      VISITA: "Visita (Corretor)",
      PRECADASTRO: "Pre-cadastro / Docs",
      RESERVA: "Reserva",
      PERDIDO: "Perdido",
    };

    let sessionUser = "";
    let stages = Object.keys(STAGE_LABELS);
    let leads = [];
    let editingId = "";
    let countdown = REFRESH_SECONDS;
    let loading = false;

    const $ = (id) => document.getElementById(id);
    const norm = (v) => String(v || "").trim().toLowerCase();
    $("refreshLabel").textContent = `${countdown}s`;

    function esc(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function toLocalInput(iso){
      if (!iso) return "";
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "";
      const year = d.getFullYear();
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      return `${year}-${month}-${day}T${hh}:${mm}`;
    }

    function fromLocalInput(value){
      if (!value) return null;
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return null;
      return d.toISOString();
    }

    function stageLabel(token){
      const key = String(token || "").trim().toUpperCase();
      return STAGE_LABELS[key] || key || "-";
    }

    function setFlash(message, kind = "ok"){
      const node = $("flash");
      node.textContent = message;
      node.className = `flash ${kind === "err" ? "err" : "ok"}`;
      setTimeout(() => {
        if (node.textContent === message){
          node.className = "flash";
          node.textContent = "";
        }
      }, 3200);
    }

    async function api(path = "", options = {}){
      const res = await fetch(`${API_BASE}${path}`, {
        credentials: "same-origin",
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
        ...options,
      });
      if (res.status === 401){
        window.location.href = "/login";
        throw new Error("Nao autenticado");
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok){
        throw new Error(data.detail || "Falha na requisicao");
      }
      return data;
    }

    async function loadSession(){
      const res = await fetch("/auth/me", { credentials: "same-origin" });
      if (res.status === 401){
        window.location.href = "/login";
        throw new Error("Nao autenticado");
      }
      const data = await res.json().catch(() => ({}));
      if (!res.ok){
        throw new Error(data.detail || "Falha ao validar sessao");
      }
      if (norm(data.role) !== "corretor"){
        window.location.href = "/app";
        throw new Error("Perfil sem acesso");
      }
      sessionUser = String(data.username || "").trim();
    }

    async function loadStages(){
      const data = await api("/stages");
      const arr = Array.isArray(data.stages) ? data.stages : [];
      if (arr.length){
        stages = arr.map((s) => String(s || "").trim().toUpperCase()).filter(Boolean);
      }
      const options = stages.map((s) => `<option value="${esc(s)}">${esc(stageLabel(s))}</option>`).join("");
      $("estagioLead").innerHTML = options;
      $("filtroStage").innerHTML = `<option value="">Todos</option>${options}`;
    }

    async function loadEmpreendimentos(){
      const res = await fetch("/app/api/empreendimentos", { credentials: "same-origin" });
      if (!res.ok) return;
      const rows = await res.json().catch(() => []);
      if (!Array.isArray(rows)) return;
      $("empreendimentosList").innerHTML = rows
        .map((item) => `<option value="${esc(item.nome || "")}"></option>`)
        .join("");
    }

    function queryString(){
      const params = new URLSearchParams();
      const q = $("filtroQ").value.trim();
      const empreendimento = $("filtroEmp").value.trim();
      const localidade = $("filtroLoc").value.trim();
      const estagio = $("filtroStage").value.trim();
      if (q) params.set("q", q);
      if (empreendimento) params.set("empreendimento", empreendimento);
      if (localidade) params.set("localidade", localidade);
      if (estagio) params.set("estagio", estagio);
      return params.toString();
    }

    function renderStages(rows){
      const counts = {};
      stages.forEach((s) => { counts[s] = 0; });
      rows.forEach((item) => {
        const key = String(item.estagio_lead || "").trim().toUpperCase();
        if (Object.prototype.hasOwnProperty.call(counts, key)){
          counts[key] += 1;
        }
      });
      $("stages").innerHTML = stages.map((stage) => `
        <div class="stageCard">
          <div class="k">${esc(stageLabel(stage))}</div>
          <div class="v">${counts[stage] || 0}</div>
        </div>
      `).join("");
    }

    function renderTable(rows){
      const tbody = $("tbody");
      if (!rows.length){
        tbody.innerHTML = `<tr><td colspan="5" class="muted">Nenhum lead encontrado para os filtros atuais.</td></tr>`;
        return;
      }
      tbody.innerHTML = rows.map((lead) => {
        const agData = lead.data_agendamento ? new Date(lead.data_agendamento).toLocaleString("pt-BR") : "-";
        const ultContato = lead.ultimo_contato_em ? new Date(lead.ultimo_contato_em).toLocaleString("pt-BR") : "-";
        const options = stages.map((s) => `
          <option value="${esc(s)}" ${String(lead.estagio_lead || "").toUpperCase() === s ? "selected" : ""}>
            ${esc(stageLabel(s))}
          </option>
        `).join("");
        const estadoCivil = String(lead.estado_civil || "").replaceAll("_", " ");
        const showCertidao = String(lead.estado_civil || "").toUpperCase() === "CASADO";
        const hasProcesso = Boolean(lead.processo_id);
        const decisaoCca = String(lead.decisao_cca || "EM_ANALISE").toUpperCase();
        const contratoAssinado = Boolean(lead.contrato_assinado);
        const assinaturaEmailConfirmada = Boolean(lead.assinatura_email_confirmada);
        let reserveReason = "";
        if (String(lead.estagio_lead || "").toUpperCase() === "PERDIDO") reserveReason = "Lead em perdido.";
        else if (hasProcesso) reserveReason = "Lead ja convertido em reserva.";
        else if (!(decisaoCca === "APROVADO" || decisaoCca === "CONDICIONADO")) reserveReason = "CCA precisa aprovar ou condicionar.";
        else if (!contratoAssinado) reserveReason = "Marque contrato assinado.";
        else if (!assinaturaEmailConfirmada) reserveReason = "Falta confirmacao de assinatura por e-mail.";
        const canReservar = String(lead.estagio_lead || "").toUpperCase() !== "PERDIDO"
          && !hasProcesso
          && (decisaoCca === "APROVADO" || decisaoCca === "CONDICIONADO")
          && contratoAssinado
          && assinaturaEmailConfirmada;
        const assinaturaEmail = assinaturaEmailConfirmada
          ? "Confirmado por e-mail"
          : (lead.assinatura_email_token_expires_at
            ? `Pendente (expira ${new Date(lead.assinatura_email_token_expires_at).toLocaleString("pt-BR")})`
            : "Nao enviado");
        const btnApresentacaoLabel = hasProcesso ? "Apresentacao" : "Apresentacao livre";
        const btnApresentacaoClass = hasProcesso ? "primary" : "";
        return `
          <tr>
            <td>
              <div class="main">${esc(lead.nome_cliente || "-")}</div>
              <div class="meta">Corretor: ${esc(lead.corretor_username || "-")}</div>
              <div class="meta">CPF: ${esc(lead.cpf || "-")} | Doc: ${esc(lead.documento_identificacao || "-")}</div>
              <div class="meta">Estado civil: ${esc(estadoCivil || "-")}${showCertidao ? ` | Certidao: ${esc(lead.certidao_numero || "-")}` : ""}</div>
            </td>
            <td>
              <div>Tel: ${esc(lead.telefone || "-")}</div>
              <div>Whats: ${esc(lead.whatsapp || "-")}</div>
              <div>Email: ${esc(lead.email || "-")}</div>
              <div>Cidade nasc.: ${esc(lead.cidade_nascimento || "-")}</div>
            </td>
            <td>
              <div><strong>Empreendimento:</strong> ${esc(lead.empreendimento_interesse || "-")}</div>
              <div><strong>Localidade:</strong> ${esc(lead.localidade_interesse || "-")}</div>
              <div><strong>CCA:</strong> ${esc(decisaoCca.replaceAll("_"," "))}</div>
              <div><strong>Contrato:</strong> ${contratoAssinado ? "Assinado" : "Nao assinado"} | <strong>Email:</strong> ${esc(assinaturaEmail)}</div>
              <div><strong>Visita:</strong> ${esc((lead.tipo_visita || "-").replaceAll("_", " "))}</div>
              <div><strong>Agenda:</strong> ${esc(lead.local_agendamento || "-")} | ${esc(agData)}</div>
              <div class="meta"><strong>Ult. contato:</strong> ${esc(ultContato)}</div>
            </td>
            <td>
              <select class="miniSel" data-action="stage" data-id="${esc(lead.id)}">${options}</select>
            </td>
            <td>
              <div class="rowTools">
                <button class="miniBtn primary" data-action="edit" data-id="${esc(lead.id)}">Editar</button>
                <button class="miniBtn success" data-action="touch" data-id="${esc(lead.id)}">Contato agora</button>
                <button class="miniBtn" data-action="contract" data-id="${esc(lead.id)}">${contratoAssinado ? "Contrato: Sim" : "Contrato: Nao"}</button>
                <button class="miniBtn" data-action="emailConfirm" data-id="${esc(lead.id)}" ${contratoAssinado ? "" : "disabled"}>Confirmar assinatura e-mail</button>
                <button class="miniBtn ${canReservar ? "success" : ""}" title="${esc(reserveReason || "Pronto para virar reserva")}" data-action="reserve" data-id="${esc(lead.id)}" ${canReservar ? "" : "disabled"}>${hasProcesso ? "Reservado" : "Virar reserva"}</button>
                <button class="miniBtn ${btnApresentacaoClass}" data-action="presentation" data-id="${esc(lead.id)}">${btnApresentacaoLabel}</button>
              </div>
            </td>
          </tr>
        `;
      }).join("");
    }

    function resetForm(){
      editingId = "";
      $("leadForm").reset();
      $("formTitle").textContent = "Novo pre-cadastro";
      $("btnSalvar").textContent = "Salvar pre-cadastro";
      if (stages.length){
        $("estagioLead").value = stages[0];
      }
      $("decisaoCca").value = "EM_ANALISE";
      $("contratoAssinado").value = "false";
      syncEstadoCivilForm();
    }

    function fillForm(lead){
      editingId = String(lead.id || "");
      $("formTitle").textContent = "Editar pre-cadastro";
      $("btnSalvar").textContent = "Salvar alteracoes";
      $("nomeCliente").value = lead.nome_cliente || "";
      $("telefone").value = lead.telefone || "";
      $("whatsapp").value = lead.whatsapp || "";
      $("email").value = lead.email || "";
      $("cpf").value = lead.cpf || "";
      $("documentoIdentificacao").value = lead.documento_identificacao || "";
      $("estadoCivil").value = String(lead.estado_civil || "").toUpperCase();
      $("certidaoNumero").value = lead.certidao_numero || "";
      $("cidadeNascimento").value = lead.cidade_nascimento || "";
      $("dataNascimento").value = lead.data_nascimento || "";
      $("endereco").value = lead.endereco || "";
      $("empreendimento").value = lead.empreendimento_interesse || "";
      $("localidade").value = lead.localidade_interesse || "";
      $("localAgendamento").value = lead.local_agendamento || "";
      $("tipoVisita").value = String(lead.tipo_visita || "").toUpperCase();
      $("dataAgendamento").value = toLocalInput(lead.data_agendamento);
      $("estagioLead").value = String(lead.estagio_lead || "").toUpperCase();
      $("decisaoCca").value = String(lead.decisao_cca || "EM_ANALISE").toUpperCase();
      $("contratoAssinado").value = String(Boolean(lead.contrato_assinado));
      $("ultimoContato").value = toLocalInput(lead.ultimo_contato_em);
      $("observacoes").value = lead.observacoes || "";
      syncEstadoCivilForm();
    }

    function syncEstadoCivilForm(){
      const isCasado = String($("estadoCivil").value || "").toUpperCase() === "CASADO";
      $("certidaoNumero").disabled = !isCasado;
      if (!isCasado){
        $("certidaoNumero").value = "";
      }
    }

    function payloadFromForm(){
      return {
        nome_cliente: $("nomeCliente").value.trim(),
        telefone: $("telefone").value.trim() || null,
        whatsapp: $("whatsapp").value.trim() || null,
        email: $("email").value.trim() || null,
        cpf: $("cpf").value.trim() || null,
        documento_identificacao: $("documentoIdentificacao").value.trim() || null,
        estado_civil: $("estadoCivil").value || null,
        certidao_numero: $("certidaoNumero").value.trim() || null,
        cidade_nascimento: $("cidadeNascimento").value.trim() || null,
        data_nascimento: $("dataNascimento").value || null,
        endereco: $("endereco").value.trim() || null,
        empreendimento_interesse: $("empreendimento").value.trim() || null,
        localidade_interesse: $("localidade").value.trim() || null,
        local_agendamento: $("localAgendamento").value.trim() || null,
        tipo_visita: $("tipoVisita").value || null,
        data_agendamento: fromLocalInput($("dataAgendamento").value),
        estagio_lead: $("estagioLead").value,
        decisao_cca: $("decisaoCca").value,
        contrato_assinado: $("contratoAssinado").value === "true",
        ultimo_contato_em: fromLocalInput($("ultimoContato").value),
        observacoes: $("observacoes").value.trim() || null,
      };
    }

    async function loadLeads(force = false){
      if (loading) return;
      if (!force && document.hidden) return;
      loading = true;
      try{
        const qs = queryString();
        const data = await api(qs ? `?${qs}` : "");
        leads = Array.isArray(data) ? data : [];
        renderStages(leads);
        renderTable(leads);
      }catch(error){
        $("tbody").innerHTML = `<tr><td colspan="5" style="color:#991b1b;">Erro ao carregar leads: ${esc(error.message)}</td></tr>`;
      }finally{
        loading = false;
      }
    }

    async function saveLead(ev){
      ev.preventDefault();
      try{
        const payload = payloadFromForm();
        if (!payload.nome_cliente){
          throw new Error("Informe o nome do cliente.");
        }
        if (editingId){
          await api(`/${encodeURIComponent(editingId)}`, {
            method: "PATCH",
            body: JSON.stringify(payload),
          });
          setFlash("Pre-cadastro atualizado com sucesso.");
        } else {
          await api("", {
            method: "POST",
            body: JSON.stringify(payload),
          });
          setFlash("Pre-cadastro criado com sucesso.");
        }
        resetForm();
        await loadLeads(true);
      }catch(error){
        setFlash(error.message || "Falha ao salvar pre-cadastro.", "err");
      }
    }

    async function quickUpdate(id, payload, successMsg){
      try{
        await api(`/${encodeURIComponent(id)}`, {
          method: "PATCH",
          body: JSON.stringify(payload),
        });
        if (successMsg){
          setFlash(successMsg);
        }
        await loadLeads(true);
      }catch(error){
        setFlash(error.message || "Falha ao atualizar lead.", "err");
      }
    }

    async function reserveLead(id){
      const data = await api(`/${encodeURIComponent(id)}/reservar`, { method: "POST" });
      if (!data || !data.processo_id){
        throw new Error("Falha ao gerar reserva.");
      }
      return data;
    }

    async function sendContractEmailConfirmation(id){
      return api(`/${encodeURIComponent(id)}/assinatura/enviar-confirmacao`, { method: "POST" });
    }

    async function onTableClick(ev){
      const target = ev.target;
      if (!(target instanceof HTMLElement)) return;
      const action = target.getAttribute("data-action");
      const id = target.getAttribute("data-id");
      if (!action || !id) return;
      const lead = leads.find((item) => String(item.id) === String(id));
      if (!lead) return;
      if (action === "edit"){
        fillForm(lead);
      } else if (action === "touch"){
        await quickUpdate(id, { ultimo_contato_em: new Date().toISOString() }, "Ultimo contato registrado.");
      } else if (action === "contract"){
        const next = !Boolean(lead.contrato_assinado);
        await quickUpdate(
          id,
          { contrato_assinado: next },
          next ? "Contrato marcado como assinado." : "Contrato desmarcado."
        );
      } else if (action === "emailConfirm"){
        try{
          const data = await sendContractEmailConfirmation(id);
          const expira = data?.token_expires_at ? new Date(data.token_expires_at).toLocaleString("pt-BR") : "-";
          setFlash(`Confirmacao enviada para ${data?.email || lead.email || "e-mail do cliente"} (expira em ${expira}).`);
          await loadLeads(true);
        }catch(error){
          setFlash(error.message || "Falha ao enviar confirmacao por e-mail.", "err");
        }
      } else if (action === "reserve"){
        try{
          const result = await reserveLead(id);
          setFlash("Lead convertido para reserva com sucesso.");
          await loadLeads(true);
          if (result.processo_id){
            const go = confirm("Reserva criada. Abrir tela de apresentacao agora?");
            if (go){
              window.location.href = `/app/corretor/apresentacao?processo_id=${encodeURIComponent(result.processo_id)}`;
            }
          }
        }catch(error){
          setFlash(error.message || "Falha ao converter lead em reserva.", "err");
        }
      } else if (action === "presentation"){
        const targetUrl = lead.processo_id
          ? `/app/corretor/apresentacao?processo_id=${encodeURIComponent(lead.processo_id)}`
          : "/app/corretor/apresentacao";
        window.location.href = targetUrl;
      }
    }

    async function onStageChange(ev){
      const target = ev.target;
      if (!(target instanceof HTMLSelectElement)) return;
      if (target.getAttribute("data-action") !== "stage") return;
      const id = target.getAttribute("data-id");
      if (!id) return;
      await quickUpdate(id, { estagio_lead: target.value }, "Estagio atualizado.");
    }

    function tick(){
      if (document.hidden){
        $("refreshLabel").textContent = "pausado";
        return;
      }
      countdown -= 1;
      if (countdown <= 0){
        countdown = REFRESH_SECONDS;
        loadLeads().catch(() => null);
      }
      $("refreshLabel").textContent = `${countdown}s`;
    }

    async function logout(){
      await fetch("/auth/logout", { method: "POST", credentials: "same-origin" }).catch(() => null);
      window.location.href = "/login";
    }

    async function boot(){
      await loadSession();
      await loadStages();
      await loadEmpreendimentos();
      resetForm();
      await loadLeads(true);
    }

    $("leadForm").addEventListener("submit", saveLead);
    $("btnNovo").addEventListener("click", resetForm);
    $("btnFiltrar").addEventListener("click", () => loadLeads(true));
    $("btnLogout").addEventListener("click", logout);
    $("estadoCivil").addEventListener("change", syncEstadoCivilForm);
    $("tbody").addEventListener("click", onTableClick);
    $("tbody").addEventListener("change", onStageChange);
    ["filtroQ", "filtroEmp", "filtroLoc"].forEach((id) => {
      $(id).addEventListener("keydown", (ev) => {
        if (ev.key === "Enter"){
          ev.preventDefault();
          loadLeads(true).catch(() => null);
        }
      });
    });
    $("filtroStage").addEventListener("change", () => loadLeads(true));
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden){
        countdown = REFRESH_SECONDS;
        loadLeads(true).catch(() => null);
      }
    });
    setInterval(tick, 1000);

    boot().catch((error) => {
      setFlash(error.message || "Falha ao iniciar tela.", "err");
    });
  </script>
</body>
</html>
