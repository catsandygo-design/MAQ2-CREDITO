<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trocar Senha | Sistema de Credito</title>
  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2c;
      --line:#22314d;
      --text:#e7eef9;
      --muted:#9cb0d1;
      --accent:#2fc16a;
      --accent2:#24a35a;
      --danger:#ff6b6b;
    }
    *{box-sizing:border-box;font-family:"Segoe UI",Arial,sans-serif}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
      color:var(--text);
      background:radial-gradient(circle at 20% 0%, #1a2a45 0%, #0b1220 45%, #070c16 100%);
    }
    .card{
      width:100%;
      max-width:440px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      border:1px solid var(--line);
      border-radius:18px;
      padding:24px;
      box-shadow:0 18px 38px rgba(0,0,0,.45);
    }
    h1{margin:0 0 8px;font-size:1.4rem}
    p{margin:0 0 18px;color:var(--muted);font-size:.92rem}
    .field{margin-bottom:12px}
    label{display:block;margin-bottom:6px;font-size:.85rem;color:var(--muted);font-weight:600}
    input{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      background:#0a1220;
      color:var(--text);
      padding:11px 12px;
      outline:none;
      font-size:.95rem;
    }
    input:focus{
      border-color:#4ba2ff;
      box-shadow:0 0 0 3px rgba(75,162,255,.15);
    }
    .actions{
      display:flex;
      gap:8px;
      margin-top:8px;
    }
    button{
      border:0;
      border-radius:12px;
      color:#06120b;
      font-weight:800;
      letter-spacing:.02em;
      padding:12px;
      cursor:pointer;
    }
    #btnSalvar{
      flex:1;
      background:linear-gradient(180deg,var(--accent),var(--accent2));
    }
    #btnSair{
      width:110px;
      color:#e7eef9;
      border:1px solid var(--line);
      background:#0a1220;
    }
    .error{
      min-height:20px;
      margin-top:12px;
      color:var(--danger);
      font-size:.88rem;
    }
    .ok{
      color:#86efac;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Troca obrigatoria de senha</h1>
    <p>No primeiro login, defina uma nova senha para continuar.</p>
    <form id="formChange">
      <div class="field">
        <label for="currentPassword">Senha atual</label>
        <input id="currentPassword" type="password" required autocomplete="current-password" />
      </div>
      <div class="field">
        <label for="newPassword">Nova senha</label>
        <input id="newPassword" type="password" required minlength="4" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="confirmPassword">Confirmar nova senha</label>
        <input id="confirmPassword" type="password" required minlength="4" autocomplete="new-password" />
      </div>
      <div class="actions">
        <button id="btnSalvar" type="submit">Salvar nova senha</button>
        <button id="btnSair" type="button">Sair</button>
      </div>
      <div class="error" id="msg" aria-live="polite"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("formChange");
    const msg = document.getElementById("msg");
    const btnSair = document.getElementById("btnSair");
    const btnSalvar = document.getElementById("btnSalvar");

    async function api(path, options = {}) {
      const res = await fetch(path, {
        credentials: "same-origin",
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options,
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Falha de comunicacao");
      return data;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      msg.textContent = "";
      msg.classList.remove("ok");

      const currentPassword = form.currentPassword.value;
      const newPassword = form.newPassword.value;
      const confirmPassword = form.confirmPassword.value;

      if (newPassword !== confirmPassword) {
        msg.textContent = "A confirmacao da nova senha nao confere.";
        return;
      }
      if ((newPassword || "").trim().length < 4) {
        msg.textContent = "A nova senha deve ter ao menos 4 caracteres.";
        return;
      }

      btnSalvar.disabled = true;
      try {
        const data = await api("/auth/change-password", {
          method: "POST",
          body: JSON.stringify({ current_password: currentPassword, new_password: newPassword }),
        });
        msg.textContent = "Senha alterada com sucesso. Redirecionando...";
        msg.classList.add("ok");
        setTimeout(() => {
          window.location.href = data.home || "/app";
        }, 700);
      } catch (error) {
        msg.textContent = error.message;
      } finally {
        btnSalvar.disabled = false;
      }
    });

    btnSair.addEventListener("click", async () => {
      await fetch("/auth/logout", { method: "POST", credentials: "same-origin" }).catch(() => null);
      window.location.href = "/login";
    });
  </script>
</body>
</html>
