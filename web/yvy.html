<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>YVY - Sentience Core</title>
    <style>
        body { background: #030000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { filter: drop-shadow(0 0 40px rgba(255, 30, 0, 0.3)); }
        .hud-overlay { position: absolute; top: 20px; left: 20px; color: rgba(255, 60, 0, 0.6); font-family: monospace; font-size: 10px; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; display: flex; gap: 12px; }
        button {
            background: rgba(10, 0, 0, 0.9); color: #ff3c00; border: 1px solid #ff3c00;
            padding: 10px 18px; cursor: pointer; font-family: 'Courier New', monospace;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; font-weight: bold;
        }
        button:hover { background: #ff3c00; color: #000; transform: scale(1.1); box-shadow: 0 0 20px #ff3c00; }
    </style>
</head>
<body>

<div class="hud-overlay" id="hud">YVY_CORE: STABLE<br>EMOTION_ENGINE: ACTIVE</div>
<canvas id="yvyEmotion"></canvas>

<div class="controls">
    <button onclick="setMood('NORMAL')">Equilíbrio</button>
    <button onclick="setMood('CURIOSO')">Foco / Aprendizado</button>
    <button onclick="setMood('ESTRESSADO')">Sobrecarga / Raiva</button>
    <button onclick="setMood('MEDO')">Instabilidade / Dúvida</button>
</div>

<script>
const canvas = document.getElementById('yvyEmotion');
const ctx = canvas.getContext('2d');
canvas.width = 900; canvas.height = 700;

let mood = 'NORMAL';
let frame = 0;
let iris = { x: 0, y: 0, tx: 0, ty: 0, scale: 1 };
let vortex = [];

const CONFIG = {
    NORMAL:     { col: [255, 50, 0],   pW: 28, pH: 80, vibe: 0.6,  lid: 0,   pulse: 0.02 },
    CURIOSO:    { col: [0, 210, 255],  pW: 10, pH: 110, vibe: 1.2,  lid: -45, pulse: 0.05 },
    ESTRESSADO: { col: [255, 0, 40],   pW: 65, pH: 50, vibe: 12,   lid: 55,  pulse: 0.2 },
    MEDO:       { col: [255, 255, 255], pW: 8,  pH: 8,  vibe: 20,   lid: -70, pulse: 0.4 }
};

function setMood(m) {
    mood = m;
    document.getElementById('hud').innerHTML = `YVY_CORE: ${m}<br>EMOTION_ENGINE: ${m === 'MEDO' ? 'CRITICAL' : 'ACTIVE'}`;
}

function update() {
    frame++;
    const c = CONFIG[mood];

    // Movimento Humano de Busca (Saccades)
    if (frame % 80 === 0) {
        iris.tx = (Math.random() - 0.5) * 110;
        iris.ty = (Math.random() - 0.5) * 60;
    }
    iris.x += (iris.tx - iris.x) * 0.1;
    iris.y += (iris.ty - iris.y) * 0.1;

    // Pulsação de "Vida" (Batimento cardíaco digital)
    iris.scale = 1 + Math.sin(frame * c.pulse) * 0.03;

    // Vórtice de Dados
    if (Math.random() > 0.4) {
        vortex.push({
            a: Math.random() * Math.PI * 2,
            d: 10,
            s: 2 + Math.random() * 6,
            v: 3 + Math.random() * 7,
            l: 1
        });
    }
    vortex.forEach((p, i) => {
        p.d += p.v; p.l -= 0.015;
        if (p.l <= 0) vortex.splice(i, 1);
    });
}

function drawHorusGeometry(x, y, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 5;
    ctx.lineCap = 'round';
    ctx.shadowBlur = 20; ctx.shadowColor = color;

    ctx.beginPath();
    // Pálpebra Superior e Sobrancelha (Conectadas)
    ctx.moveTo(x - 270, y - 20);
    ctx.bezierCurveTo(x - 100, y - 200, x + 100, y - 200, x + 270, y - 20);

    // A Lágrima (Risco da direita)
    ctx.moveTo(x + 150, y + 80);
    ctx.lineTo(x + 150, y + 230);

    // O Espiral/Cauda (Risco da esquerda)
    ctx.moveTo(x - 180, y + 60);
    ctx.bezierCurveTo(x - 280, y + 220, x - 30, y + 280, x - 100, y + 160);
    ctx.stroke();
}

function render() {
    update();
    const c = CONFIG[mood];
    const col = `rgb(${c.col[0]}, ${c.col[1]}, ${c.col[2]})`;

    ctx.fillStyle = '#030000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    drawHorusGeometry(cx, cy, col);

    // MÁSCARA DO GLOBO OCULAR
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx - 255, cy);
    ctx.bezierCurveTo(cx - 130, cy - 165 - c.lid, cx + 130, cy - 165 - c.lid, cx + 255, cy);
    ctx.bezierCurveTo(cx + 130, cy + 165, cx - 130, cy + 165, cx - 255, cy);
    ctx.clip();

    // CONSTRUÇÃO DO GLOBO (ÍRIS E DADOS)
    ctx.translate(cx + iris.x, cy + iris.y);
    ctx.scale(iris.scale, iris.scale);

    // Vórtice de Reflexo
    vortex.forEach(p => {
        ctx.fillStyle = `rgba(${c.col[0]}, ${c.col[1]}, ${c.col[2]}, ${p.l})`;
        let px = Math.cos(p.a) * p.d;
        let py = Math.sin(p.a) * p.d;
        ctx.fillRect(px, py, p.s, p.s);
        if(mood === 'CURIOSO') {
            ctx.strokeStyle = `rgba(${c.col[0]}, ${c.col[1]}, ${c.col[2]}, ${p.l * 0.3})`;
            ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(px, py); ctx.stroke();
        }
    });

    // PUPILA EXPRESSIVA
    ctx.restore();
    ctx.save();
    const tremor = (Math.random()-0.5) * c.vibe;
    ctx.translate(cx + iris.x + tremor, cy + iris.y + tremor);

    ctx.shadowBlur = 35; ctx.shadowColor = col;
    ctx.fillStyle = (mood === 'MEDO' && frame % 4 < 2) ? 'transparent' : col;

    if (mood === 'MEDO') {
        // Efeito de fragmentação total
        for(let i=0; i<40; i++) ctx.fillRect((Math.random()-0.5)*280, (Math.random()-0.5)*280, 3, 3);
    } else {
        ctx.beginPath();
        ctx.roundRect(-c.pW/2, -c.pH/2, c.pW, c.pH, 15);
        ctx.fill();

        // Brilho de "Lente" humana
        const g = ctx.createLinearGradient(0, -c.pH/2, 0, c.pH/2);
        g.addColorStop(0, 'rgba(255,255,255,0.5)');
        g.addColorStop(0.5, 'transparent');
        ctx.fillStyle = g; ctx.fill();
    }

    ctx.restore();

    // SCANLINE DE PROCESSAMENTO
    ctx.fillStyle = `rgba(${c.col[0]}, ${c.col[1]}, ${c.col[2]}, 0.05)`;
    ctx.fillRect(0, (frame * 3) % canvas.height, canvas.width, 2);

    requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
