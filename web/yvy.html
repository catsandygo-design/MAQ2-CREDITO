<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ORION MINI EYE</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #5a0000 0%, #2a0000 35%, #0a0000 70%, #000 100%);
      overflow: hidden;
    }
    canvas {
      border-radius: 28px;
      box-shadow: 0 0 60px rgba(255,80,0,.35);
    }
  </style>
</head>
<body>
  <canvas id="eye"></canvas>
  <script>
    const canvas = document.getElementById('eye');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const maxW = Math.min(window.innerWidth - 24, 520);
      canvas.width = maxW;
      canvas.height = Math.max(220, Math.floor(maxW * 0.62));
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    let frame = 0;
    let mood = 'normal';       // normal | irritado | alerta | triste | aprendendo
    let moodExpireAt = 0;
    let gaze = { x: 0, y: 0, tx: 0, ty: 0 };
    let alertLevel = 0;        // 0..1 (distância do cursor)
    let lastMove = 0;
    let userEnergy = 0.4;
    let alertCount = 0;

    // Recebe sinais do app pai (corretor) para mudar humor automaticamente
    window.addEventListener('message', (event) => {
      if (location.origin && event.origin !== location.origin) return;
      const data = event.data || {};
      if (data.type === 'yvy:mood') {
        const energy = Math.max(0, Math.min(1, data.energy ?? 0));
        userEnergy = Math.max(userEnergy, energy);
        if (data.mood === 'alerta') { setMood('alerta', 6000); alertCount++; }
        else if (data.mood === 'aprendendo') setMood('aprendendo', 4500);
        else if (data.mood === 'irritado') setMood('irritado', 5000);
        else if (data.mood === 'triste') setMood('triste', 5000);
        else setMood('normal', 3500);
      }
    });

    function setMood(next, ttl = 5000) {
      mood = next;
      moodExpireAt = performance.now() + ttl;
      if (next === 'alerta') alertCount++;
      if (alertCount > 3) {
        mood = 'irritado';
        moodExpireAt = performance.now() + 5000;
        alertCount = 0;
      }
    }

    // Segue mouse/toque para parallax e nível de alerta
    function updatePointer(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const mx = clientX - rect.left;
      const my = clientY - rect.top;
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      gaze.tx = (mx - cx) * 0.12;
      gaze.ty = (my - cy) * 0.08;
      const dist = Math.hypot(mx - cx, my - cy);
      alertLevel = Math.min(1, dist / (canvas.width * 0.42));
      lastMove = frame;
    }

    window.addEventListener('mousemove', (e) => updatePointer(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => { const t = e.touches[0]; if (t) updatePointer(t.clientX, t.clientY); }, { passive: true });

    function eyeShape(cx, cy) {
      ctx.beginPath();
      ctx.moveTo(cx - 180, cy);
      ctx.bezierCurveTo(cx - 90, cy - 90, cx + 90, cy - 90, cx + 180, cy);
      ctx.bezierCurveTo(cx + 90, cy + 90, cx - 90, cy + 90, cx - 180, cy);
    }

    function render() {
      frame++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      if (moodExpireAt && performance.now() > moodExpireAt) {
        mood = 'normal';
        moodExpireAt = 0;
      }

      // micro-saccades ociosas
      if (frame - lastMove > 90 && frame % 70 === 0) {
        gaze.tx = (Math.random() - 0.5) * 24;
        gaze.ty = (Math.random() - 0.5) * 10;
      }

      // follow suave
      gaze.x += (gaze.tx - gaze.x) * 0.12;
      gaze.y += (gaze.ty - gaze.y) * 0.12;

      const bg = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      bg.addColorStop(0, '#7a0000');
      bg.addColorStop(0.5, '#2b0000');
      bg.addColorStop(1, '#0b0000');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      eyeShape(cx, cy);
      ctx.clip();

      // reflexão de vidro quadriculada
      ctx.save();
      ctx.translate(cx + gaze.x * 0.35, cy + gaze.y * 0.2);
      ctx.rotate(frame * (0.002 + alertLevel * 0.004));
      for (let x = -260; x < 260; x += 26) {
        for (let y = -160; y < 160; y += 26) {
          const alpha = 0.01 + (Math.sin(frame * 0.03 + x * 0.02 + y * 0.02) + 1) * (0.006 + alertLevel * 0.01);
          ctx.fillStyle = `rgba(255,160,120,${alpha})`;
          ctx.fillRect(x, y, 24, 24);
        }
      }
      ctx.restore();

      // eyeball core
      ctx.save();
      ctx.translate(gaze.x, gaze.y);

      // leds inferiores (alerta acende)
      for (let i = 0; i < 9; i++) {
        for (let j = 0; j < 2; j++) {
          const hotline = mood === 'alerta' ? ((frame * 0.35 + i * 0.8 + j) % 9) / 9 : 0;
          ctx.fillStyle = `rgba(255,60,0,${0.45 + j * 0.1 + alertLevel * 0.1 + hotline * 0.35})`;
          ctx.fillRect(cx - 70 + i * 16 - gaze.x * 0.1, cy + 58 + j * 14 - gaze.y * 0.05, 11, 11);
        }
      }

      // paleta de humor
      let moodColor = [255, 160, 50];
      let moodSpeedBoost = 0;
      let moodSquint = 0;
      let matrixBreak = 0;
      let auraAlpha = 0.08;
      if (mood === 'irritado') { moodColor = [255, 40, 40]; moodSpeedBoost = 0.02; moodSquint = 0.1; auraAlpha = 0.14; }
      if (mood === 'alerta') { moodColor = [255, 70, 40]; moodSpeedBoost = 0.03; moodSquint = 0.08; }
      if (mood === 'triste') { moodColor = [180, 120, 255]; moodSpeedBoost = -0.003; moodSquint = -0.03; auraAlpha = 0.04; }
      if (mood === 'aprendendo') { moodColor = [120, 255, 180]; moodSpeedBoost = 0.01; matrixBreak = (Math.sin(frame * 0.08) + 1) * 0.5; auraAlpha = 0.12; }

      // aura energética
      ctx.save();
      ctx.translate(cx, cy);
      for (let a = 0; a < 3; a++) {
        ctx.beginPath();
        ctx.arc(0, 0, 82 + a * 10 + Math.sin(frame * 0.03 + a) * 2, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(${moodColor[0]},${moodColor[1]},${moodColor[2]},${auraAlpha - a * 0.02})`;
        ctx.lineWidth = 4;
        ctx.stroke();
      }
      ctx.restore();

      // anéis da íris
      const baseSpeed = 0.008 + alertLevel * 0.02 + moodSpeedBoost;
      for (let i = 0; i < 3; i++) {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(frame * baseSpeed * (i % 2 === 0 ? 1 : -1));
        ctx.beginPath();
        ctx.arc(0, 0, 64 - i * 14 + Math.sin(frame * 0.05) * 1.5, 0, Math.PI * 2);
        ctx.lineWidth = 6 - i * 1.5;
        ctx.strokeStyle = `rgba(${moodColor[0]},${Math.max(0, moodColor[1] - i * 20)},${moodColor[2]},${0.9 - i * 0.2})`;
        ctx.stroke();
        ctx.restore();
      }

      // pupila / learning matrix
      ctx.shadowBlur = 18 + alertLevel * 20;
      ctx.shadowColor = 'rgba(255,180,60,.9)';
      ctx.fillStyle = `rgba(${moodColor[0]},${moodColor[1]},${moodColor[2]},${0.9 + alertLevel * 0.1})`;
      if (mood === 'aprendendo') {
        for (let yy = -42; yy < 42; yy += 8) {
          const offset = Math.sin(frame * 0.12 + yy) * matrixBreak * 18;
          ctx.fillRect(cx - 14 + offset, cy + yy, 28, 6);
        }
      } else {
        ctx.fillRect(cx - 14, cy - 42, 28, 84);
      }

      // brilho da lente
      const shine = ctx.createLinearGradient(cx - 40 + gaze.x * 0.2, cy - 60, cx + 40 + gaze.x * 0.2, cy + 60);
      shine.addColorStop(0, 'rgba(255,255,255,.22)');
      shine.addColorStop(0.5, 'rgba(255,255,255,.04)');
      shine.addColorStop(1, 'rgba(255,255,255,.18)');
      ctx.fillStyle = shine;
      ctx.fillRect(cx - 40, cy - 60, 24, 120);

      ctx.restore();
      ctx.restore();

      // pálpebra externa
      ctx.strokeStyle = 'rgba(255,120,40,.95)';
      ctx.lineWidth = 6;
      ctx.shadowBlur = 20 + alertLevel * 10;
      ctx.shadowColor = 'rgba(255,80,0,.9)';
      ctx.save();
      ctx.translate(0, alertLevel * 3);
      ctx.scale(mood === 'irritado' ? 0.92 : 1, 1 - alertLevel * 0.06 - (mood === 'irritado' ? 0.1 : 0) - (mood === 'triste' ? -0.06 : 0));
      eyeShape(cx, cy);
      ctx.stroke();
      ctx.restore();

      // indicadores superiores
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        const r = 4 + Math.sin(frame * 0.06 + i) * 0.5 + (i === 1 ? alertLevel * 1.2 : 0);
        ctx.arc(cx - 24 + i * 24, cy - 85, r, 0, Math.PI * 2);
        ctx.fillStyle = i === 1 ? `rgba(255,200,90,${0.8 + alertLevel * 0.2})` : 'rgba(255,140,60,.85)';
        ctx.fill();
      }

      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
