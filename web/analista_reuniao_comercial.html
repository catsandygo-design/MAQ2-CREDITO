<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reuniao Comercial | Analista</title>
  <style>
    :root {
      --bg: #d9e5f4;
      --bg2: #e7eef8;
      --surface: #f7fbff;
      --surface-2: #edf4fd;
      --line: rgba(30, 64, 105, 0.22);
      --text: #0f172a;
      --muted: #475569;
      --accent: #0ea5e9;
      --ok: #16a34a;
      --warn: #d97706;
      --danger: #dc2626;
      --dark: #0f172a;
      --radius: 14px;
      --shadow: 0 10px 22px rgba(30, 64, 105, 0.1);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1300px 620px at 8% -18%, rgba(59,130,246,.12), transparent 60%),
        radial-gradient(980px 520px at 96% 3%, rgba(14,165,233,.10), transparent 58%),
        linear-gradient(180deg, var(--bg2), var(--bg));
    }

    .wrap {
      height: 100%;
      padding: 8px;
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr);
      gap: 8px;
    }

    .topbar,
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 10px 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .title h1 {
      margin: 0;
      font-size: 22px;
      color: #0a3357;
      line-height: 1.05;
    }

    .title p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 6px;
    }

    .btn {
      border: 1px solid rgba(37,99,235,.38);
      background: linear-gradient(180deg, #eef6ff, #deebfb);
      color: #11355a;
      border-radius: 12px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: .15s ease;
      white-space: nowrap;
    }

    .btn:hover {
      background: linear-gradient(180deg, #f8fbff, #d6e8ff);
      border-color: rgba(37,99,235,.52);
      box-shadow: 0 4px 12px rgba(37,99,235,.18);
      transform: translateY(-1px);
    }

    .btn.active {
      color: #0b507f;
      border-color: rgba(14,165,233,.55);
      background: linear-gradient(180deg, #d5edff, #bfddff);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.55);
    }

    .btn.danger {
      border-color: rgba(220,38,38,.4);
      background: #fee2e2;
      color: #991b1b;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(7, minmax(130px, 1fr));
      gap: 6px;
    }

    .kpi {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: linear-gradient(180deg, #f8fbff, #edf4fd);
      padding: 6px 8px;
      min-height: 64px;
      display: grid;
      gap: 3px;
    }

    .kpi .k {
      font-size: 11px;
      color: #1f3f63;
      font-weight: 700;
    }

    .kpi .v {
      font-size: 23px;
      line-height: 1;
      color: #0f172a;
      font-weight: 900;
    }

    .kpi .s {
      font-size: 10px;
      color: var(--muted);
    }

    .kpi.ok { border-color: rgba(22,163,74,.34); }
    .kpi.ok .v { color: #166534; }
    .kpi.warn { border-color: rgba(217,119,6,.36); }
    .kpi.warn .v { color: #92400e; }
    .kpi.bad { border-color: rgba(220,38,38,.36); }
    .kpi.bad .v { color: #991b1b; }

    .deliveryToday {
      padding: 8px 10px;
      display: grid;
      gap: 6px;
      min-height: 62px;
    }

    .deliveryToday h2 {
      margin: 0;
      font-size: 13px;
      color: #0a3357;
    }

    .deliveryChips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      min-height: 28px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid rgba(30,64,105,.3);
      background: #eaf2ff;
      color: #1e3a5f;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
    }

    .chip.empty {
      color: var(--muted);
      font-weight: 600;
      background: #f6f9ff;
    }

    .list {
      min-height: 0;
      padding: 8px;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 8px;
    }

    .listHead {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 220px auto;
      gap: 8px;
      align-items: center;
    }

    .field,
    .miniField {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f7fbff;
      color: var(--text);
      padding: 7px 9px;
      font-size: 12px;
      width: 100%;
      outline: none;
    }

    .field:focus,
    .miniField:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(14,116,144,.58);
      box-shadow: 0 0 0 3px rgba(14,116,144,.16);
    }

    .rows {
      min-height: 0;
      overflow: auto;
      padding-right: 2px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .row {
      border: 1px solid rgba(30,64,105,.2);
      border-radius: 12px;
      background: linear-gradient(180deg, #f8fbff, #edf4fd);
      padding: 8px;
      display: grid;
      grid-template-columns: minmax(220px, 1.2fr) 70px 1fr;
      gap: 8px;
      align-items: start;
    }

    .row.today {
      border-color: rgba(14,165,233,.48);
      box-shadow: inset 0 0 0 1px rgba(14,165,233,.2);
      background: linear-gradient(180deg, #e8f8ff, #dff2ff);
    }

    .identity {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .identity .name {
      margin: 0;
      font-size: 18px;
      line-height: 1.05;
      color: #0a3357;
      font-weight: 900;
      word-break: break-word;
    }

    .identity .meta {
      font-size: 12px;
      color: #2f4b69;
      line-height: 1.25;
      word-break: break-word;
    }

    .identity .stage {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      border: 1px solid rgba(30,64,105,.28);
      background: #eef4ff;
      color: #1e3a5f;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
    }

    .slaCircle {
      width: 58px;
      height: 58px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 15px;
      font-weight: 900;
      border: 2px solid transparent;
      margin-top: 2px;
    }

    .slaCircle small {
      display: block;
      font-size: 9px;
      font-weight: 700;
      margin-top: -1px;
      opacity: .95;
    }

    .slaCircle.ok { background: #dcfce7; color: #166534; border-color: rgba(22,163,74,.4); }
    .slaCircle.warn { background: #fef3c7; color: #92400e; border-color: rgba(217,119,6,.4); }
    .slaCircle.bad { background: #fee2e2; color: #991b1b; border-color: rgba(220,38,38,.45); }
    .slaCircle.dark { background: #0f172a; color: #ffffff; border-color: #0f172a; }

    .controls {
      min-width: 0;
      display: grid;
      gap: 7px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 6px;
    }

    .ctrl {
      border: 1px solid rgba(30,64,105,.2);
      border-radius: 10px;
      background: #f9fcff;
      padding: 5px;
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .ctrl label {
      font-size: 10px;
      color: #35506d;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .checkLine {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #1e3a5f;
      font-weight: 700;
    }

    .counter {
      border-radius: 10px;
      border: 1px solid rgba(220,38,38,.35);
      background: #fee2e2;
      color: #991b1b;
      font-size: 12px;
      font-weight: 800;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 4px 8px;
    }

    textarea {
      width: 100%;
      min-height: 48px;
      resize: vertical;
      border: 1px solid rgba(30,64,105,.2);
      border-radius: 10px;
      background: #f7fbff;
      color: var(--text);
      padding: 7px 8px;
      font-size: 12px;
      outline: none;
      font-family: inherit;
    }

    .commitments {
      border: 1px dashed rgba(30,64,105,.28);
      border-radius: 10px;
      background: #f7fbff;
      padding: 6px;
      display: grid;
      gap: 6px;
    }

    .commitHead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .commitHead strong {
      color: #0a3357;
      font-size: 11px;
    }

    .commitList {
      display: grid;
      gap: 6px;
      max-height: 118px;
      overflow: auto;
      padding-right: 2px;
    }

    .commit {
      border: 1px solid rgba(30,64,105,.2);
      border-radius: 8px;
      background: #fdfefe;
      padding: 5px 6px;
      display: grid;
      gap: 4px;
    }

    .commitMeta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      flex-wrap: wrap;
      font-size: 11px;
      color: #1e3a5f;
      font-weight: 700;
    }

    .badge {
      border-radius: 999px;
      padding: 2px 8px;
      border: 1px solid rgba(30,64,105,.3);
      background: #ecf4ff;
      font-size: 10px;
      font-weight: 800;
      color: #1e3a5f;
      text-transform: uppercase;
      letter-spacing: .02em;
    }

    .badge.ok {
      background: #dcfce7;
      color: #166534;
      border-color: rgba(22,163,74,.35);
    }

    .badge.bad {
      background: #fee2e2;
      color: #991b1b;
      border-color: rgba(220,38,38,.35);
    }

    .badge.warn {
      background: #fef3c7;
      color: #92400e;
      border-color: rgba(217,119,6,.35);
    }

    .commitText {
      font-size: 11px;
      color: #334155;
      line-height: 1.3;
      word-break: break-word;
    }

    .commitActions {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .btnMini {
      border: 1px solid rgba(30,64,105,.28);
      background: #eef5ff;
      color: #11355a;
      border-radius: 8px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 800;
      cursor: pointer;
    }

    .btnMini.warn {
      border-color: rgba(217,119,6,.35);
      background: #fff7e6;
      color: #92400e;
    }

    .btnMini.ok {
      border-color: rgba(22,163,74,.35);
      background: #ecfdf5;
      color: #166534;
    }

    .rowActions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .msg {
      min-height: 16px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .msg.err { color: #991b1b; }
    .msg.ok { color: #166534; }

    @media (max-width: 1600px) {
      .summary { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .row { grid-template-columns: minmax(220px, 1fr) 64px 1.25fr; }
      .grid { grid-template-columns: repeat(3, minmax(120px, 1fr)); }
    }

    @media (max-width: 1100px) {
      .topbar { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .listHead { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
      .grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .slaCircle { width: 52px; height: 52px; }
    }

    @media (max-width: 760px) {
      .summary { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      .title h1 { font-size: 18px; }
      .title p { font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="title">
        <h1>Reuniao Comercial (Analista)</h1>
        <p>Cobranca vespertina com gestores comerciais: previsao de entrega, risco de queda, cancelamento e reincidencias.</p>
      </div>
      <div class="actions">
        <a class="btn" href="/app/analista">Painel</a>
        <a class="btn" href="/app/analista/acompanhamento">Acompanhamento</a>
        <a class="btn active" href="/app/analista/reuniao-comercial">Reuniao Comercial</a>
        <a class="btn" href="/app/analista/acompanhamento-operacional">Operacional</a>
        <a class="btn" href="/app/analista/repasse">Repasse</a>
        <button class="btn" id="btnRefresh" type="button">Atualizar</button>
        <button class="btn danger" id="btnLogout" type="button">Sair</button>
      </div>
    </header>

    <section class="summary" id="summary"></section>

    <section class="card deliveryToday">
      <h2>Clientes com entrega marcada para hoje</h2>
      <div class="deliveryChips" id="deliveryToday"></div>
    </section>

    <section class="card list">
      <div class="listHead">
        <input class="field" id="q" placeholder="Buscar cliente, empreendimento, corretor ou imobiliaria..." />
        <select class="field" id="stageFilter">
          <option value="">Todas as fases</option>
          <option value="EM_PROCESSO">Em Processo</option>
          <option value="CREDITO">Credito</option>
          <option value="SECRETARIA_VENDAS">Secretaria de Vendas</option>
        </select>
        <div class="msg" id="msg"></div>
      </div>
      <div class="rows" id="rows"></div>
    </section>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const norm = (v) => String(v || "").trim().toLowerCase();
    let DASHBOARD = null;
    let BUSY = false;

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        credentials: "same-origin",
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options,
      });
      if (response.status === 401) {
        window.location.href = "/login";
        throw new Error("Sessao expirada.");
      }
      const payload = await response.json().catch(() => null);
      if (!response.ok) {
        const detail = payload?.detail || `Erro ${response.status}`;
        throw new Error(detail);
      }
      return payload;
    }

    function setMessage(text, tone = "") {
      const node = $("msg");
      node.className = "msg";
      if (tone) node.classList.add(tone);
      node.textContent = text || "";
    }

    function fmtDate(value) {
      if (!value) return "-";
      const dt = new Date(`${value}T00:00:00`);
      if (Number.isNaN(dt.getTime())) return String(value);
      return dt.toLocaleDateString("pt-BR");
    }

    function toneBySla(days) {
      const n = Number(days || 0);
      if (n <= 5) return "ok";
      if (n <= 14) return "warn";
      if (n <= 29) return "bad";
      return "dark";
    }

    function compromissoBadge(status) {
      const token = norm(status).replaceAll("-", "_");
      if (token === "entregue") return '<span class="badge ok">ENTREGUE</span>';
      if (token === "nao_entregue") return '<span class="badge bad">NAO ENTREGUE</span>';
      return '<span class="badge warn">PENDENTE</span>';
    }

    function rowMatchesFilter(row, query, stage) {
      if (stage && String(row.estagio_comercial || "") !== stage) return false;
      if (!query) return true;
      const text = `${row.cliente_nome} ${row.empreendimento || ""} ${row.corretor || ""} ${row.imobiliaria || ""}`.toLowerCase();
      return text.includes(query);
    }

    function buildSummary(data) {
      $("summary").innerHTML = `
        <article class="kpi"><div class="k">Total clientes</div><div class="v">${Number(data.total_clientes || 0)}</div><div class="s">Fases: Processo/Credito/Secretaria</div></article>
        <article class="kpi ok"><div class="k">Assinados</div><div class="v">${Number(data.assinados || 0)}</div><div class="s">Ja concluido</div></article>
        <article class="kpi"><div class="k">Vai seguir</div><div class="v">${Number(data.seguir || 0)}</div><div class="s">Fluxo normal</div></article>
        <article class="kpi warn"><div class="k">Finalizar hoje</div><div class="v">${Number(data.finalizar_hoje || 0)}</div><div class="s">Cobranca do dia</div></article>
        <article class="kpi warn"><div class="k">Entrega hoje</div><div class="v">${Number(data.entrega_hoje || 0)}</div><div class="s">Com data de entrega hoje</div></article>
        <article class="kpi bad"><div class="k">Prob. de cair</div><div class="v">${Number(data.risco_queda || 0)}</div><div class="s">Acompanhamento critico</div></article>
        <article class="kpi bad"><div class="k">Solicitar cancel.</div><div class="v">${Number(data.solicitar_cancelamento || 0)}</div><div class="s">Revisar com gestor</div></article>
      `;
    }

    function buildDeliveryToday(data) {
      const list = Array.isArray(data.clientes_entrega_hoje) ? data.clientes_entrega_hoje : [];
      const target = $("deliveryToday");
      if (!list.length) {
        target.innerHTML = '<span class="chip empty">Nenhum cliente marcado para entrega hoje.</span>';
        return;
      }
      target.innerHTML = list.map((name) => `<span class="chip">${esc(name)}</span>`).join("");
    }

    function renderRows() {
      const query = norm($("q").value);
      const stage = $("stageFilter").value || "";
      const rows = (DASHBOARD?.clientes || []).filter((row) => rowMatchesFilter(row, query, stage));
      const container = $("rows");
      if (!rows.length) {
        container.innerHTML = '<article class="card" style="padding:12px;border:1px dashed rgba(30,64,105,.35);">Nenhum cliente para esse filtro.</article>';
        return;
      }

      container.innerHTML = rows.map((row) => {
        const tone = toneBySla(row.sla_dias);
        const compromissos = Array.isArray(row.compromissos) ? row.compromissos : [];
        const compsHtml = compromissos.length
          ? compromissos.map((item) => {
              const st = norm(item.status).replaceAll("-", "_");
              const canMarkMissed = st === "pendente";
              const canMarkDelivered = st === "pendente" || st === "nao_entregue";
              return `
                <article class="commit">
                  <div class="commitMeta">
                    <span>${fmtDate(item.data_prometida)}</span>
                    ${compromissoBadge(item.status)}
                  </div>
                  ${item.observacao ? `<div class="commitText">${esc(item.observacao)}</div>` : ""}
                  ${item.justificativa ? `<div class="commitText"><strong>Justificativa:</strong> ${esc(item.justificativa)}</div>` : ""}
                  <div class="commitActions">
                    ${canMarkMissed ? `<button class="btnMini warn" data-action="comp-missed" data-comp-id="${item.id}" type="button">Nao entregou</button>` : ""}
                    ${canMarkDelivered ? `<button class="btnMini ok" data-action="comp-delivered" data-comp-id="${item.id}" type="button">Entregue</button>` : ""}
                  </div>
                </article>
              `;
            }).join("")
          : '<div class="commitText">Sem promessas registradas.</div>';

        return `
          <article class="row ${row.entrega_hoje ? "today" : ""}" data-processo-id="${row.processo_id}">
            <div class="identity">
              <h3 class="name">${esc(row.cliente_nome)}</h3>
              <div class="meta">${esc(row.empreendimento || "-")}</div>
              <div class="meta">${esc(row.corretor || "-")} - ${esc(row.imobiliaria || "-")}</div>
              <span class="stage">${esc(String(row.estagio_comercial || "").replaceAll("_", " "))}</span>
            </div>
            <div class="slaCircle ${tone}">
              <div>${Number(row.sla_dias || 0)}</div>
              <small>dias</small>
            </div>
            <div class="controls">
              <div class="grid">
                <div class="ctrl">
                  <label>Conta no mes</label>
                  <label class="checkLine"><input type="checkbox" data-field="conta_no_mes" ${row.conta_no_mes ? "checked" : ""}/> Sim</label>
                </div>
                <div class="ctrl">
                  <label>Entrega prevista</label>
                  <input class="miniField" type="date" data-field="data_prevista_entrega" value="${row.data_prevista_entrega || ""}" />
                </div>
                <div class="ctrl">
                  <label>Decisao da reuniao</label>
                  <select class="miniField" data-field="status_followup">
                    <option value="seguir" ${row.status_followup === "seguir" ? "selected" : ""}>Vai seguir</option>
                    <option value="finalizar_hoje" ${row.status_followup === "finalizar_hoje" ? "selected" : ""}>Finalizar no dia</option>
                    <option value="assinado" ${row.status_followup === "assinado" ? "selected" : ""}>Assinado</option>
                  </select>
                </div>
                <div class="ctrl">
                  <label>Falhou entrega</label>
                  <div class="counter">${Number(row.nao_entregou_count || 0)}x</div>
                </div>
                <div class="ctrl">
                  <label>Probabilidade de cair</label>
                  <label class="checkLine"><input type="checkbox" data-field="probabilidade_queda" ${row.probabilidade_queda ? "checked" : ""}/> Sim</label>
                </div>
                <div class="ctrl">
                  <label>Solicitar cancelamento</label>
                  <label class="checkLine"><input type="checkbox" data-field="solicitar_cancelamento" ${row.solicitar_cancelamento ? "checked" : ""}/> Sim</label>
                </div>
                <div class="ctrl" style="grid-column: span 2;">
                  <label>Nova promessa de entrega</label>
                  <div class="rowActions">
                    <input class="miniField" style="max-width:170px;" type="date" data-field="nova_data_promessa" />
                    <button class="btnMini" data-action="add-comp" type="button">Registrar promessa</button>
                  </div>
                </div>
              </div>

              <div class="commitments">
                <div class="commitHead"><strong>Historico de promessas</strong><span class="chip">${compromissos.length} registro(s)</span></div>
                <div class="commitList">${compsHtml}</div>
              </div>

              <div class="grid" style="grid-template-columns:1fr 1fr;">
                <div class="ctrl">
                  <label>Observacoes da reuniao</label>
                  <textarea data-field="observacao" placeholder="O que foi cobrado, combinado e pendencias...">${esc(row.observacao || "")}</textarea>
                </div>
                <div class="ctrl">
                  <label>Justificativa de reincidencia</label>
                  <textarea data-field="justificativa_reincidencia" placeholder="Justificar repeticao de promessa nao cumprida...">${esc(row.justificativa_reincidencia || "")}</textarea>
                </div>
              </div>

              <div class="rowActions">
                <button class="btnMini" data-action="save-row" type="button">Salvar linha</button>
                <span class="chip">Cadastro: ${fmtDate(row.data_cadastro_origem)}</span>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadDashboard() {
      if (BUSY) return;
      BUSY = true;
      setMessage("Carregando dados da reuniao...");
      try {
        const data = await api("/app/api/analista/reuniao-comercial?limit=800");
        DASHBOARD = data;
        buildSummary(data);
        buildDeliveryToday(data);
        renderRows();
        setMessage(`Atualizado: ${new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`, "ok");
      } catch (error) {
        setMessage(`Falha ao carregar: ${error.message}`, "err");
      } finally {
        BUSY = false;
      }
    }

    function rowField(row, selector) {
      return row.querySelector(selector);
    }

    async function saveRow(row) {
      const processoId = row.dataset.processoId;
      if (!processoId) return;
      const payload = {
        conta_no_mes: Boolean(rowField(row, '[data-field="conta_no_mes"]')?.checked),
        data_prevista_entrega: rowField(row, '[data-field="data_prevista_entrega"]')?.value || null,
        status_followup: rowField(row, '[data-field="status_followup"]')?.value || "seguir",
        probabilidade_queda: Boolean(rowField(row, '[data-field="probabilidade_queda"]')?.checked),
        solicitar_cancelamento: Boolean(rowField(row, '[data-field="solicitar_cancelamento"]')?.checked),
        observacao: rowField(row, '[data-field="observacao"]')?.value || "",
        justificativa_reincidencia: rowField(row, '[data-field="justificativa_reincidencia"]')?.value || "",
      };
      await api(`/app/api/analista/reuniao-comercial/${encodeURIComponent(processoId)}`, {
        method: "PATCH",
        body: JSON.stringify(payload),
      });
    }

    async function addCompromisso(row) {
      const processoId = row.dataset.processoId;
      const dateValue = rowField(row, '[data-field="nova_data_promessa"]')?.value || "";
      if (!dateValue) {
        throw new Error("Informe a data da promessa.");
      }
      await api(`/app/api/analista/reuniao-comercial/${encodeURIComponent(processoId)}/compromissos`, {
        method: "POST",
        body: JSON.stringify({ data_prometida: dateValue }),
      });
    }

    async function marcarCompromissoNaoEntregue(compromissoId) {
      const justificativa = window.prompt("Informe a justificativa do nao entregue:");
      if (justificativa === null) return;
      if (!String(justificativa || "").trim()) throw new Error("Justificativa obrigatoria.");
      const novaData = window.prompt("Nova data prometida (AAAA-MM-DD). Deixe vazio se nao houver:");
      const payload = {
        justificativa: justificativa.trim(),
      };
      const normalized = String(novaData || "").trim();
      if (normalized) {
        payload.nova_data_prometida = normalized;
      }
      await api(`/app/api/analista/reuniao-comercial/compromissos/${encodeURIComponent(compromissoId)}/nao-entregue`, {
        method: "POST",
        body: JSON.stringify(payload),
      });
    }

    async function marcarCompromissoEntregue(compromissoId) {
      await api(`/app/api/analista/reuniao-comercial/compromissos/${encodeURIComponent(compromissoId)}/entregue`, {
        method: "POST",
      });
    }

    $("rows").addEventListener("click", async (event) => {
      const button = event.target.closest("[data-action]");
      if (!button) return;
      const action = button.dataset.action;
      const row = event.target.closest(".row");
      if (!row && action !== "comp-delivered" && action !== "comp-missed") return;
      try {
        button.disabled = true;
        if (action === "save-row") {
          await saveRow(row);
          await loadDashboard();
          setMessage("Linha salva com sucesso.", "ok");
          return;
        }
        if (action === "add-comp") {
          await addCompromisso(row);
          await loadDashboard();
          setMessage("Promessa registrada.", "ok");
          return;
        }
        if (action === "comp-missed") {
          const compromissoId = button.dataset.compId;
          if (!compromissoId) return;
          await marcarCompromissoNaoEntregue(compromissoId);
          await loadDashboard();
          setMessage("Compromisso marcado como nao entregue.", "ok");
          return;
        }
        if (action === "comp-delivered") {
          const compromissoId = button.dataset.compId;
          if (!compromissoId) return;
          await marcarCompromissoEntregue(compromissoId);
          await loadDashboard();
          setMessage("Compromisso marcado como entregue.", "ok");
          return;
        }
      } catch (error) {
        setMessage(`Falha na acao: ${error.message}`, "err");
      } finally {
        button.disabled = false;
      }
    });

    $("q").addEventListener("input", renderRows);
    $("stageFilter").addEventListener("change", renderRows);
    $("btnRefresh").addEventListener("click", () => {
      void loadDashboard();
    });
    $("btnLogout").addEventListener("click", async () => {
      await fetch("/auth/logout", { method: "POST", credentials: "same-origin" }).catch(() => null);
      window.location.href = "/login";
    });

    void loadDashboard();
    window.setInterval(() => {
      if (document.hidden) return;
      void loadDashboard();
    }, 60000);
  </script>
</body>
</html>
