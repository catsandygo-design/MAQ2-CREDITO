<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Sistema de Crédito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep: #030712;
      --bg-mid: #0a0f1e;
      --glass-bg: rgba(10, 15, 30, 0.55);
      --glass-border: rgba(34, 197, 94, 0.18);
      --glass-border-hover: rgba(34, 197, 94, 0.45);
      --accent: #22c55e;
      --accent-glow: rgba(34, 197, 94, 0.6);
      --accent-soft: rgba(34, 197, 94, 0.12);
      --text: #f0fdf4;
      --text-soft: #94a3b8;
      --input-bg: rgba(3, 7, 18, 0.7);
      --input-border: rgba(51, 65, 85, 0.6);
      --danger: #ef4444;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-deep);
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* ========== CANVAS DE PARTÍCULAS ========== */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ========== ORBS DE FUNDO ========== */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      animation: orbFloat 12s ease-in-out infinite;
    }

    .bg-orb--green {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(34, 197, 94, 0.4), transparent 70%);
      top: -80px;
      left: -80px;
      animation-delay: 0s;
    }

    .bg-orb--blue {
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.25), transparent 70%);
      bottom: -60px;
      right: -60px;
      animation-delay: -4s;
    }

    .bg-orb--purple {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.2), transparent 70%);
      top: 40%;
      right: 15%;
      animation-delay: -8s;
    }

    @keyframes orbFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      25% {
        transform: translate(20px, -30px) scale(1.05);
      }

      50% {
        transform: translate(-15px, 20px) scale(0.95);
      }

      75% {
        transform: translate(10px, 15px) scale(1.02);
      }
    }

    /* ========== CONTAINER PRINCIPAL ========== */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    /* ========== CARD GLASSMORPHISM ========== */
    .login-card {
      position: relative;
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px 32px 32px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03) inset,
        0 25px 50px rgba(0, 0, 0, 0.5),
        0 0 80px rgba(34, 197, 94, 0.06);
      opacity: 0;
      transform: translateY(30px) scale(0.97);
      animation: cardEnter 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards;
      overflow: hidden;
    }

    .login-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
          transparent,
          rgba(34, 197, 94, 0.5) 30%,
          rgba(56, 189, 248, 0.3) 70%,
          transparent);
      opacity: 0.8;
    }

    .login-card::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, rgba(34, 197, 94, 0.04), transparent 50%);
      pointer-events: none;
      animation: cardShimmer 8s ease-in-out infinite;
    }

    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes cardShimmer {

      0%,
      100% {
        transform: translate(-10%, -10%) rotate(0deg);
      }

      50% {
        transform: translate(10%, 10%) rotate(3deg);
      }
    }

    /* ========== LOGO / ÍCONE ========== */
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      position: relative;
      z-index: 1;
    }

    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(56, 189, 248, 0.1));
      border: 1px solid rgba(34, 197, 94, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.15);
      animation: logoPulse 3s ease-in-out infinite;
    }

    .logo-icon svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px rgba(34, 197, 94, 0.4));
    }

    @keyframes logoPulse {

      0%,
      100% {
        box-shadow: 0 0 30px rgba(34, 197, 94, 0.15);
      }

      50% {
        box-shadow: 0 0 40px rgba(34, 197, 94, 0.25), 0 0 60px rgba(34, 197, 94, 0.08);
      }
    }

    /* ========== TEXTOS ========== */
    .login-title {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #f0fdf4, #bbf7d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-subtitle {
      text-align: center;
      color: var(--text-soft);
      font-size: 0.88rem;
      margin-bottom: 28px;
      position: relative;
      z-index: 1;
      line-height: 1.5;
    }

    /* ========== CAMPOS DE INPUT ========== */
    .field-group {
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .field-label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .field-input-wrap {
      position: relative;
    }

    .field-input-wrap .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      fill: none;
      stroke: var(--text-soft);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s ease;
      pointer-events: none;
    }

    .field-input {
      width: 100%;
      padding: 13px 14px 13px 44px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 14px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .field-input::placeholder {
      color: rgba(148, 163, 184, 0.5);
    }

    .field-input:hover {
      border-color: rgba(71, 85, 105, 0.8);
    }

    .field-input:focus {
      border-color: var(--accent);
      box-shadow:
        0 0 0 3px var(--accent-soft),
        0 0 20px rgba(34, 197, 94, 0.08);
      background: rgba(3, 7, 18, 0.9);
    }

    .field-input:focus~.field-icon {
      stroke: var(--accent);
    }

    /* ========== BOTÃO ENTRAR ========== */
    .submit-btn {
      position: relative;
      z-index: 1;
      width: 100%;
      padding: 14px 20px;
      margin-top: 8px;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      color: #020617;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      box-shadow:
        0 0 0 1px rgba(34, 197, 94, 0.3),
        0 4px 16px rgba(34, 197, 94, 0.25),
        0 0 40px rgba(34, 197, 94, 0.08);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }

    .submit-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(255, 255, 255, 0.15),
          transparent);
      transition: left 0.5s ease;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 0 1px rgba(34, 197, 94, 0.5),
        0 8px 24px rgba(34, 197, 94, 0.35),
        0 0 60px rgba(34, 197, 94, 0.12);
    }

    .submit-btn:hover::before {
      left: 100%;
    }

    .submit-btn:active {
      transform: translateY(0);
      box-shadow:
        0 0 0 1px rgba(34, 197, 94, 0.3),
        0 2px 8px rgba(34, 197, 94, 0.2);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none !important;
    }

    /* ========== LOADING SPINNER ========== */
    .btn-loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(2, 6, 23, 0.3);
      border-top-color: #020617;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .submit-btn.loading .spinner {
      display: inline-block;
    }

    .submit-btn.loading .btn-text {
      opacity: 0.7;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ========== MENSAGEM DE ERRO ========== */
    .error-box {
      min-height: 20px;
      margin-top: 14px;
      font-size: 0.84rem;
      color: var(--danger);
      text-align: center;
      position: relative;
      z-index: 1;
      transition: opacity 0.3s ease;
    }

    /* ========== HINT ========== */
    .card-hint {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid rgba(51, 65, 85, 0.3);
      font-size: 0.74rem;
      color: var(--text-soft);
      text-align: center;
      position: relative;
      z-index: 1;
      line-height: 1.6;
    }

    .card-hint code {
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-family: 'Fira Code', 'Consolas', monospace;
    }

    /* ========== FLOATING BADGES ========== */
    .float-badge {
      position: fixed;
      z-index: 0;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0;
      animation: badgeFloat 16s ease-in-out infinite;
    }

    .float-badge--1 {
      background: rgba(34, 197, 94, 0.08);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: rgba(34, 197, 94, 0.5);
      top: 18%;
      left: 8%;
      animation-delay: 0s;
    }

    .float-badge--2 {
      background: rgba(56, 189, 248, 0.06);
      border: 1px solid rgba(56, 189, 248, 0.15);
      color: rgba(56, 189, 248, 0.4);
      top: 72%;
      right: 6%;
      animation-delay: -5s;
    }

    .float-badge--3 {
      background: rgba(168, 85, 247, 0.06);
      border: 1px solid rgba(168, 85, 247, 0.15);
      color: rgba(168, 85, 247, 0.4);
      bottom: 15%;
      left: 12%;
      animation-delay: -10s;
    }

    @keyframes badgeFloat {

      0%,
      100% {
        opacity: 0;
        transform: translateY(0px) rotate(-2deg);
      }

      15% {
        opacity: 0.7;
      }

      50% {
        opacity: 0.5;
        transform: translateY(-25px) rotate(2deg);
      }

      85% {
        opacity: 0.7;
      }
    }

    /* ========== RESPONSIVIDADE ========== */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 22px 24px;
        border-radius: 20px;
      }

      .login-title {
        font-size: 1.3rem;
      }

      .bg-orb {
        opacity: 0.2;
      }

      .float-badge {
        display: none;
      }
    }

    /* ========== REDUCED MOTION ========== */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }

      .login-card {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>

  <!-- Partículas Canvas -->
  <canvas id="particleCanvas"></canvas>

  <!-- Orbs de fundo -->
  <div class="bg-orb bg-orb--green"></div>
  <div class="bg-orb bg-orb--blue"></div>
  <div class="bg-orb bg-orb--purple"></div>

  <!-- Badges flutuantes -->
  <span class="float-badge float-badge--1">Crédito</span>
  <span class="float-badge float-badge--2">Processos</span>
  <span class="float-badge float-badge--3">Análise</span>

  <!-- Card de Login -->
  <div class="login-wrapper">
    <main class="login-card">
      <div class="logo-container">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
        </div>
      </div>

      <h1 class="login-title">Sistema de Crédito</h1>
      <p class="login-subtitle">Faça login para acessar o painel do seu perfil.</p>

      <form id="loginForm" novalidate autocomplete="off">
        <div class="field-group">
          <label class="field-label" for="username">Usuário</label>
          <div class="field-input-wrap">
            <input class="field-input" id="username" name="username" type="text" placeholder="Digite seu usuário"
              required autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" />
            <svg class="field-icon" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Senha</label>
          <div class="field-input-wrap">
            <input class="field-input" id="password" name="password" type="password" placeholder="Digite sua senha"
              required autocomplete="new-password" />
            <svg class="field-icon" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </div>
        </div>

        <button class="submit-btn" id="submitBtn" type="submit">
          <span class="btn-loading">
            <span class="spinner"></span>
            <span class="btn-text">Entrar</span>
          </span>
        </button>

        <div class="error-box" id="errorBox" aria-live="polite"></div>
      </form>

      <div class="card-hint">
        Acesso de manutenção: faça login com perfil admin e abra <code>/admin</code>
      </div>
    </main>
  </div>

  <!-- ========== PARTÍCULAS + LÓGICA DE LOGIN ========== -->
  <script>
    /* ---------- PARTÍCULAS FLUTUANTES (Antigravity) ---------- */
    (function () {
      const canvas = document.getElementById("particleCanvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      let W, H;
      const particles = [];
      const PARTICLE_COUNT = 60;
      const CONNECTION_DIST = 120;
      let mouseX = -9999, mouseY = -9999;
      let animId = null;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function createParticle() {
        return {
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.4,
          vy: -(Math.random() * 0.3 + 0.1),      // sobe (antigravidade)
          r: Math.random() * 2 + 0.8,
          alpha: Math.random() * 0.5 + 0.15,
          hue: Math.random() > 0.7 ? 200 : 142,   // verde ou azul
        };
      }

      function init() {
        resize();
        particles.length = 0;
        for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(createParticle());
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);

        // Linhas de conexão
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < CONNECTION_DIST) {
              const opacity = (1 - dist / CONNECTION_DIST) * 0.12;
              ctx.strokeStyle = `rgba(34, 197, 94, ${opacity})`;
              ctx.lineWidth = 0.6;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        // Partículas
        for (const p of particles) {
          // Mouse repulsion
          const mdx = p.x - mouseX;
          const mdy = p.y - mouseY;
          const mDist = Math.sqrt(mdx * mdx + mdy * mdy);
          if (mDist < 100 && mDist > 0) {
            const force = (100 - mDist) / 100 * 0.8;
            p.vx += (mdx / mDist) * force;
            p.vy += (mdy / mDist) * force;
          }

          p.x += p.vx;
          p.y += p.vy;

          // Damping para suavidade
          p.vx *= 0.99;
          p.vy *= 0.99;

          // Antigravidade: força sutil para cima
          p.vy -= 0.002;

          // Wrap
          if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
          if (p.y > H + 10) { p.y = -10; }
          if (p.x < -10) p.x = W + 10;
          if (p.x > W + 10) p.x = -10;

          ctx.beginPath();
          const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
          gradient.addColorStop(0, `hsla(${p.hue}, 80%, 60%, ${p.alpha})`);
          gradient.addColorStop(1, `hsla(${p.hue}, 80%, 60%, 0)`);
          ctx.fillStyle = gradient;
          ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
          ctx.fill();

          // Ponto central brilhante
          ctx.beginPath();
          ctx.fillStyle = `hsla(${p.hue}, 90%, 75%, ${p.alpha * 1.5})`;
          ctx.arc(p.x, p.y, p.r * 0.7, 0, Math.PI * 2);
          ctx.fill();
        }

        animId = requestAnimationFrame(draw);
      }

      // Reduz partículas para mobile
      const isMobile = window.matchMedia("(max-width: 768px)").matches;
      if (isMobile) {
        while (particles.length > 25) particles.pop();
      }

      window.addEventListener("resize", () => { resize(); });
      document.addEventListener("mousemove", (e) => { mouseX = e.clientX; mouseY = e.clientY; });
      document.addEventListener("mouseleave", () => { mouseX = -9999; mouseY = -9999; });

      // Respeita prefers-reduced-motion
      const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (!prefersReduced) {
        init();
        draw();
      }
    })();

    /* ---------- LÓGICA DE LOGIN ---------- */
    (function () {
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("errorBox");
      const submitBtn = document.getElementById("submitBtn");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");

      function clearCredentialInputs() {
        if (usernameInput) usernameInput.value = "";
        if (passwordInput) passwordInput.value = "";
      }

      async function checkSession() {
        try {
          const res = await fetch("/auth/me", { credentials: "same-origin" });
          if (res.ok) {
            const data = await res.json().catch(() => ({}));
            window.location.href = data.home || "/app";
          }
        } catch (_) { }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        errorBox.textContent = "";
        submitBtn.disabled = true;
        submitBtn.classList.add("loading");

        const payload = {
          username: (usernameInput?.value || "").trim(),
          password: passwordInput?.value || "",
        };

        try {
          const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "same-origin",
            body: JSON.stringify(payload),
          });

          if (!res.ok) {
            let detail = "Usuário ou senha inválidos.";
            try {
              const data = await res.json();
              detail = data.detail || detail;
            } catch (_) { }
            errorBox.textContent = detail;
            return;
          }

          const data = await res.json().catch(() => ({}));
          window.location.href = data.home || "/app";
        } catch (_) {
          errorBox.textContent = "Falha ao conectar com o servidor.";
        } finally {
          submitBtn.disabled = false;
          submitBtn.classList.remove("loading");
        }
      });

      clearCredentialInputs();
      window.addEventListener("pageshow", clearCredentialInputs);
      checkSession();
    })();
  </script>
</body>

</html>
