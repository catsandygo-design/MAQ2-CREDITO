<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login | Sistema de Crédito</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #111a2c;
      --line: #22314d;
      --text: #e7eef9;
      --muted: #9cb0d1;
      --accent: #2fc16a;
      --accent-2: #24a35a;
      --danger: #ff6b6b;
    }
    * { box-sizing: border-box; font-family: "Segoe UI", Arial, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 0%, #1a2a45 0%, #0b1220 45%, #070c16 100%);
      color: var(--text);
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.01));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 26px;
      box-shadow: 0 18px 38px rgba(0,0,0,.45);
    }
    h1 { margin: 0 0 8px; font-size: 1.4rem; }
    p { margin: 0 0 18px; color: var(--muted); font-size: .92rem; }
    .field { margin-bottom: 12px; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: .85rem;
      color: var(--muted);
      font-weight: 600;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #0a1220;
      color: var(--text);
      padding: 11px 12px;
      outline: none;
      font-size: .95rem;
    }
    input:focus {
      border-color: #4ba2ff;
      box-shadow: 0 0 0 3px rgba(75,162,255,.15);
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #06120b;
      font-weight: 800;
      letter-spacing: .02em;
      padding: 12px;
      cursor: pointer;
      margin-top: 6px;
    }
    button:disabled { opacity: .65; cursor: not-allowed; }
    .error {
      min-height: 20px;
      margin-top: 12px;
      color: var(--danger);
      font-size: .88rem;
    }
    .hint {
      margin-top: 14px;
      font-size: .78rem;
      color: var(--muted);
      border-top: 1px dashed var(--line);
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Sistema de Crédito</h1>
    <p>Faça login para acessar o painel do seu perfil.</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Usuário</label>
        <input id="username" name="username" type="text" required autocomplete="username" />
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" required autocomplete="current-password" />
      </div>
      <button id="submitBtn" type="submit">Entrar</button>
      <div class="error" id="errorBox" aria-live="polite"></div>
    </form>

    <div class="hint">
      Credenciais por ambiente: `APP_CORRETOR_USER/PASSWORD`, `APP_CCA_USER/PASSWORD`, `APP_ANALISTA_USER/PASSWORD`.
    </div>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorBox");
    const submitBtn = document.getElementById("submitBtn");

    async function checkSession() {
      try {
        const res = await fetch("/auth/me", { credentials: "same-origin" });
        if (res.ok) {
          const data = await res.json().catch(() => ({}));
          window.location.href = data.home || "/app/checklist";
        }
      } catch (_) {
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.textContent = "";
      submitBtn.disabled = true;

      const payload = {
        username: form.username.value.trim(),
        password: form.password.value,
      };

      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          let detail = "Usuário ou senha inválidos.";
          try {
            const data = await res.json();
            detail = data.detail || detail;
          } catch (_) {
          }
          errorBox.textContent = detail;
          return;
        }

        const data = await res.json().catch(() => ({}));
        window.location.href = data.home || "/app/checklist";
      } catch (_) {
        errorBox.textContent = "Falha ao conectar com o servidor.";
      } finally {
        submitBtn.disabled = false;
      }
    });

    checkSession();
  </script>
</body>
</html>
