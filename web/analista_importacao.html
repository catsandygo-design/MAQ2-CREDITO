<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Importacao de Clientes</title>
  <style>
    :root{
      --bg:#020617;
      --bg2:#01040f;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#22c55e;
      --danger:#ef4444;
      --warn:#f59e0b;
      --border: rgba(148,163,184,.14);
      --radius:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 650px at 20% 0%, rgba(31,41,55,.65) 0%, rgba(2,6,23,1) 60%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }
    .wrap{
      max-width:1120px;
      margin:0 auto;
      padding:18px 14px;
      display:grid;
      gap:12px;
    }
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .title h1{margin:0;font-size:20px}
    .title p{margin:4px 0 0;color:var(--muted)}
    .card{
      border:1px solid var(--border);
      border-radius:16px;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      padding:14px;
      display:grid;
      gap:10px;
    }
    .row{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .btn{
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text);
      padding:10px 12px;
      border-radius:14px;
      cursor:pointer;
      font-weight:700;
      text-decoration:none;
      display:inline-block;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn.primary{
      border-color: rgba(34,197,94,.55);
      background: rgba(34,197,94,.10);
    }
    input[type="number"], input[type="file"]{
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(2,6,23,.60);
      color: var(--text);
      padding: 10px 11px;
      min-width:260px;
    }
    .hint{color:var(--muted);font-size:13px}
    .msg{min-height:18px;color:var(--muted)}
    .msg.ok{color:var(--accent)}
    .msg.err{color:var(--danger)}
    .meter{
      width:16px;
      height:220px;
      border-radius:999px;
      border:1px solid rgba(148,163,184,.22);
      background: rgba(2,6,23,.7);
      overflow:hidden;
      position:relative;
      flex: 0 0 16px;
    }
    .fill{
      position:absolute;
      left:0; right:0; bottom:0;
      height:0%;
      background: linear-gradient(180deg, rgba(34,197,94,.95), rgba(16,185,129,.95));
      transition:height .25s ease;
    }
    .result-wrap{
      border-top:1px solid var(--border);
      padding-top:10px;
      display:grid;
      gap:8px;
    }
    .result-list{
      max-height:260px;
      overflow:auto;
      border:1px solid var(--border);
      border-radius:12px;
      background: rgba(2,6,23,.45);
      padding:8px;
      display:grid;
      gap:6px;
    }
    .result-item{
      border:1px solid rgba(148,163,184,.14);
      border-radius:10px;
      padding:8px;
      font-size:13px;
    }
    .tag{
      font-size:11px;
      border-radius:999px;
      padding:2px 8px;
      border:1px solid var(--border);
      margin-left:6px;
    }
    .ok{color:var(--accent)}
    .warn{color:var(--warn)}
    .bad{color:var(--danger)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">
        <h1>Importacao de Clientes</h1>
        <p>Tela dedicada para upload de planilha e configuracao da meta mensal.</p>
      </div>
      <a class="btn" href="/app/analista">Voltar para Painel</a>
    </div>

    <section class="card" aria-label="Meta mensal">
      <div class="row">
        <input id="metaMensal" type="number" min="0" step="1" placeholder="Meta mensal do gestor" />
        <button class="btn" id="btnSalvarMeta" type="button">Salvar Meta</button>
      </div>
      <div class="hint" id="metaHint">Meta mensal definida pelo analista.</div>
    </section>

    <section class="card" aria-label="Importacao de planilha">
      <div class="row">
        <input id="fileImport" type="file" accept=".csv,.xlsx" />
        <button class="btn primary" id="btnImportar" type="button">Importar Planilha</button>
        <div class="meter" title="Progresso da importacao">
          <div class="fill" id="importFill"></div>
        </div>
      </div>
      <div class="hint">Colunas obrigatorias: nome_cliente, data_cadastro, estagio, empreendimento, corretor, imobiliaria.</div>
      <div class="msg" id="importMsg">Aguardando arquivo...</div>

      <div class="result-wrap">
        <div class="hint" id="resultSummary">Nenhuma importacao executada.</div>
        <div class="result-list" id="resultList"></div>
      </div>
    </section>
  </div>

  <script>
    const API_BASE = "/app/api";
    const $ = (id) => document.getElementById(id);

    function setImportProgress(percent) {
      const fill = $("importFill");
      if (!fill) return;
      const safe = Math.max(0, Math.min(100, Number(percent || 0)));
      fill.style.height = `${safe}%`;
    }

    async function api(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        credentials: "same-origin",
        headers: { "Content-Type": "application/json", ...(options.headers || {}) },
        ...options,
      });
      if (response.status === 401) {
        window.location.href = "/login";
        throw new Error("Nao autenticado");
      }
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.detail || "Falha na requisicao");
      return data;
    }

    async function uploadPlanilha(file) {
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open("POST", `${API_BASE}/processos/importar`, true);
        xhr.withCredentials = true;

        xhr.upload.onprogress = (event) => {
          if (!event.lengthComputable) return;
          const pct = Math.round((event.loaded / event.total) * 100);
          setImportProgress(pct);
        };

        xhr.onerror = () => reject(new Error("Falha de rede durante a importacao."));
        xhr.onload = () => {
          let data = {};
          try { data = JSON.parse(xhr.responseText || "{}"); } catch (_) {}
          if (xhr.status === 401) {
            window.location.href = "/login";
            reject(new Error("Nao autenticado"));
            return;
          }
          if (xhr.status < 200 || xhr.status >= 300) {
            reject(new Error(data.detail || "Falha ao importar planilha."));
            return;
          }
          resolve(data);
        };

        const formData = new FormData();
        formData.append("file", file);
        xhr.send(formData);
      });
    }

    function renderResultados(data) {
      const resultList = $("resultList");
      const resultSummary = $("resultSummary");
      if (!resultList || !resultSummary) return;

      const total = Number(data?.total_linhas || 0);
      const importados = Number(data?.importados || 0);
      const ignorados = Number(data?.ignorados_existentes || 0);
      const invalidados = Number(data?.invalidados || 0);
      const linhas = Array.isArray(data?.resultados) ? data.resultados : [];

      resultSummary.textContent =
        `Resultado: ${importados} importado(s), ${ignorados} ignorado(s), ${invalidados} invalido(s), total ${total} linha(s) processada(s).`;

      if (!linhas.length) {
        resultList.innerHTML = `<div class="result-item">Nenhuma linha processada.</div>`;
        return;
      }

      resultList.innerHTML = linhas.map((row) => {
        const status = String(row.status || "").toLowerCase();
        let cls = "warn";
        if (status === "importado") cls = "ok";
        if (status === "invalido") cls = "bad";
        const nome = row.nome_cliente || "-";
        const motivo = row.motivo ? ` - ${row.motivo}` : "";
        return `<div class="result-item"><strong>Linha ${row.linha}</strong> | ${nome} <span class="tag ${cls}">${row.status}</span>${motivo}</div>`;
      }).join("");
    }

    async function loadMetaMensal() {
      const metaInput = $("metaMensal");
      const metaHint = $("metaHint");
      const data = await api("/gestor/meta");
      const meta = Number(data?.meta ?? 0);
      metaInput.value = String(Number.isFinite(meta) && meta >= 0 ? Math.round(meta) : 0);
      if (metaHint) metaHint.textContent = `Meta mensal atual: ${metaInput.value || "0"} (definida pelo analista).`;
    }

    $("btnSalvarMeta").addEventListener("click", async () => {
      const metaInput = $("metaMensal");
      const metaHint = $("metaHint");
      const raw = String(metaInput?.value || "").trim();
      const parsed = Number(raw);
      if (!Number.isFinite(parsed) || parsed < 0) {
        metaHint.textContent = "Informe uma meta valida (numero inteiro >= 0).";
        return;
      }
      try {
        const data = await api("/gestor/meta", {
          method: "PUT",
          body: JSON.stringify({ meta: Math.round(parsed) }),
        });
        metaInput.value = String(Number(data?.meta ?? 0));
        metaHint.textContent = `Meta mensal salva: ${metaInput.value} (definida pelo analista).`;
      } catch (error) {
        metaHint.textContent = `Erro ao salvar meta: ${error.message}`;
      }
    });

    $("btnImportar").addEventListener("click", async () => {
      const fileEl = $("fileImport");
      const msgEl = $("importMsg");
      const btn = $("btnImportar");
      const file = fileEl?.files?.[0];

      if (!file) {
        msgEl.textContent = "Selecione um arquivo .csv ou .xlsx para importar.";
        msgEl.className = "msg err";
        return;
      }

      btn.disabled = true;
      setImportProgress(0);
      msgEl.textContent = "Importando planilha...";
      msgEl.className = "msg";
      try {
        const data = await uploadPlanilha(file);
        renderResultados(data);
        msgEl.textContent = "Importacao concluida com sucesso.";
        msgEl.className = "msg ok";
        setImportProgress(100);
      } catch (error) {
        msgEl.textContent = `Erro na importacao: ${error.message}`;
        msgEl.className = "msg err";
        setImportProgress(0);
      } finally {
        btn.disabled = false;
      }
    });

    loadMetaMensal().catch((error) => {
      const metaHint = $("metaHint");
      if (metaHint) metaHint.textContent = `Erro ao carregar meta: ${error.message}`;
    });
  </script>
</body>
</html>
