services:
  - type: web
    name: sistema-credito-api
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && if command -v npm >/dev/null 2>&1; then cd frontend-react && npm install --no-audit --no-fund && npm run build && cd ..; else echo "npm nao encontrado no builder; usando dist versionado se existir."; fi
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health/db
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: STARTUP_DB_STRICT
        value: "false"
      - key: DB_POOL_SIZE
        value: "15"
      - key: DB_MAX_OVERFLOW
        value: "5"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_POOL_RECYCLE
        value: "1800"
      - key: DB_CONNECT_TIMEOUT
        value: "10"
      - key: APP_LOGIN_USER
        value: "admin"
      - key: APP_LOGIN_PASSWORD
        sync: false
      - key: SESSION_TTL_SECONDS
        value: "43200"
      - key: SESSION_IDLE_TIMEOUT_SECONDS
        value: "600"
      - key: SESSION_DB_SYNC_INTERVAL_SECONDS
        value: "60"
      - key: PROCESS_LIST_CACHE_TTL_SECONDS
        value: "8"
      - key: SESSION_COOKIE_SECURE
        value: "true"
