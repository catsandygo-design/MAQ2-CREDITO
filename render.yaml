services:
  - type: web
    name: sistema-credito
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11