services:
  - type: web
    name: sistema-credito-api
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && if command -v npm >/dev/null 2>&1; then cd frontend-react && npm install --no-audit --no-fund && npm run build && cd ..; else echo "npm nao encontrado no builder; usando dist versionado se existir."; fi
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health/db
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: STARTUP_DB_STRICT
        value: "false"
      - key: DB_POOL_SIZE
        value: "15"
      - key: DB_MAX_OVERFLOW
        value: "5"
      - key: DB_POOL_TIMEOUT
        value: "30"
      - key: DB_POOL_RECYCLE
        value: "1800"
      - key: DB_CONNECT_TIMEOUT
        value: "10"
      - key: APP_LOGIN_USER
        value: "admin"
      - key: APP_LOGIN_PASSWORD
        sync: false
      - key: APP_ADMIN_PASSWORD
        sync: false
      - key: APP_CORRETOR_PASSWORD
        sync: false
      - key: APP_CCA_PASSWORD
        sync: false
      - key: APP_ANALISTA_PASSWORD
        sync: false
      - key: APP_GESTOR_PASSWORD
        sync: false
      - key: APP_GESTOR_CREDITO_PASSWORD
        sync: false
      - key: SESSION_TTL_SECONDS
        value: "43200"
      - key: SESSION_IDLE_TIMEOUT_SECONDS
        value: "600"
      - key: SESSION_DB_SYNC_INTERVAL_SECONDS
        value: "60"
      - key: PROCESS_LIST_CACHE_TTL_SECONDS
        value: "8"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: ENABLE_LEGACY_DEMO_USERS
        value: "false"
      - key: PII_ENCRYPTION_KEY
        sync: false
      - key: EMAIL_DELIVERY_PROVIDER
        value: "brevo"
      - key: EMAIL_BREVO_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: "Frankstein SioCred"
      - key: EMAIL_SMTP_HOST
        sync: false
      - key: EMAIL_SMTP_PORT
        value: "587"
      - key: EMAIL_SMTP_USER
        sync: false
      - key: EMAIL_SMTP_PASSWORD
        sync: false
      - key: EMAIL_SMTP_FROM
        sync: false
      - key: EMAIL_SMTP_STARTTLS
        value: "true"
      - key: SIOCRED_ALERT_EMAIL_TO
        sync: false
      - key: SIOCRED_EMAIL_ALERT_TOKEN
        sync: false
      - key: SIOCRED_EMAIL_ALERT_WINDOW_MINUTES
        value: "6"
