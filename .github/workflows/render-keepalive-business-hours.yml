name: Render Keepalive (Business Hours)

on:
  schedule:
    # 08:00-18:55 America/Sao_Paulo (UTC-3) => 11:00-21:55 UTC
    - cron: "*/5 11-21 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secret
        id: secret
        shell: bash
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          if [[ -z "${RENDER_KEEPALIVE_URL}" ]]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Secret RENDER_KEEPALIVE_URL nao configurado. Pulando ping."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build keepalive URL
        if: steps.secret.outputs.missing == 'false'
        id: url
        shell: bash
        run: |
          BASE="${RENDER_KEEPALIVE_URL%/}"
          if [[ "$BASE" == */health/keepalive ]]; then
            echo "target=$BASE" >> "$GITHUB_OUTPUT"
          else
            echo "target=$BASE/health/keepalive" >> "$GITHUB_OUTPUT"
          fi
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}

      - name: Ping Render keepalive endpoint
        if: steps.secret.outputs.missing == 'false'
        shell: bash
        run: |
          echo "Pinging $TARGET"
          curl --fail --silent --show-error --max-time 120 --retry 2 --retry-delay 5 --retry-all-errors "$TARGET" > /dev/null
        env:
          TARGET: ${{ steps.url.outputs.target }}
