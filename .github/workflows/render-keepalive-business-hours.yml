name: Render Keepalive (Business Hours)

on:
  schedule:
    # 08:00-18:55 America/Sao_Paulo (UTC-3) => 11:00-21:55 UTC
    - cron: "*/5 11-21 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/render-keepalive-business-hours.yml"

permissions:
  contents: read

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Validate secret
        id: secret
        shell: bash
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
        run: |
          if [[ -z "${RENDER_KEEPALIVE_URL}" ]]; then
            echo "missing=true" >> "$GITHUB_OUTPUT"
            echo "Secret RENDER_KEEPALIVE_URL nao configurado. Pulando ping."
          else
            echo "missing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build keepalive URL
        if: steps.secret.outputs.missing == 'false'
        id: url
        shell: bash
        run: |
          RAW="${RENDER_KEEPALIVE_URL//$'\r'/}"
          RAW="${RAW//$'\n'/}"
          RAW="$(echo "$RAW" | xargs)"
          if [[ -z "$RAW" ]]; then
            echo "RENDER_KEEPALIVE_URL vazio apos normalizacao."
            exit 1
          fi

          if [[ "$RAW" =~ ^https?:// ]]; then
            BASE="${RAW%/}"
          else
            BASE="https://${RAW%/}"
          fi

          if ! [[ "$BASE" =~ ^https?://[A-Za-z0-9.-]+(:[0-9]+)?(/.*)?$ ]]; then
            echo "Formato invalido para RENDER_KEEPALIVE_URL. Valor informado nao parece URL."
            echo "Use formato: https://seu-app.onrender.com"
            exit 1
          fi

          if [[ "$BASE" == */health/keepalive ]]; then
            echo "target=$BASE" >> "$GITHUB_OUTPUT"
          else
            echo "target=$BASE/health/keepalive" >> "$GITHUB_OUTPUT"
          fi
        env:
          RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}

      - name: Ping Render keepalive endpoint
        if: steps.secret.outputs.missing == 'false'
        shell: bash
        run: |
          echo "Pinging $TARGET"
          curl --fail --silent --show-error --location --max-time 120 --retry 2 --retry-delay 5 --retry-all-errors "$TARGET" > /dev/null
        env:
          TARGET: ${{ steps.url.outputs.target }}
