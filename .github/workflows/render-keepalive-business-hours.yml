name: Render Keepalive

on:
  schedule:
    - cron: "2 */3 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/render-keepalive-business-hours.yml"

permissions:
  contents: read

concurrency:
  group: render-keepalive-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ping-render:
    runs-on: ubuntu-latest
    timeout-minutes: 179
    env:
      RENDER_KEEPALIVE_URL: ${{ secrets.RENDER_KEEPALIVE_URL }}
    steps:
      - name: Check keepalive secret
        id: check
        shell: bash
        run: |
          if [[ -z "${RENDER_KEEPALIVE_URL}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Secret RENDER_KEEPALIVE_URL nao configurado. Ignorando keepalive."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build keepalive URL
        id: url
        shell: bash
        if: steps.check.outputs.skip == 'false'
        run: |
          RAW="${RENDER_KEEPALIVE_URL//$'\r'/}"
          RAW="${RAW//$'\n'/}"
          RAW="$(echo "$RAW" | xargs)"
          if [[ -z "$RAW" ]]; then
            echo "RENDER_KEEPALIVE_URL vazio apos normalizacao."
            exit 1
          fi

          if [[ "$RAW" =~ ^https?:// ]]; then
            BASE="${RAW%/}"
          else
            BASE="https://${RAW%/}"
          fi

          if ! [[ "$BASE" =~ ^https?://[A-Za-z0-9.-]+(:[0-9]+)?(/.*)?$ ]]; then
            echo "Formato invalido para RENDER_KEEPALIVE_URL. Valor informado nao parece URL."
            echo "Use formato: https://seu-app.onrender.com"
            exit 1
          fi

          if [[ "$BASE" == */health/keepalive ]]; then
            echo "target=$BASE" >> "$GITHUB_OUTPUT"
          else
            echo "target=$BASE/health/keepalive" >> "$GITHUB_OUTPUT"
          fi

      - name: Ping Render keepalive endpoint
        shell: bash
        if: steps.check.outputs.skip == 'false'
        run: |
          set -euo pipefail

          ping_once() {
            echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Pinging $TARGET"
            curl --fail --silent --show-error --location --max-time 120 --retry 2 --retry-delay 5 --retry-all-errors --user-agent "github-actions-keepalive" --write-out "HTTP %{http_code} in %{time_total}s\n" --output /dev/null "$TARGET"
          }

          if [[ "$EVENT_NAME" == "schedule" ]]; then
            for attempt in $(seq 1 36); do
              ping_once
              if [[ "$attempt" -lt 36 ]]; then
                sleep 300
              fi
            done
          else
            ping_once
          fi
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET: ${{ steps.url.outputs.target }}
