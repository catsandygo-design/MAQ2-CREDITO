name: Keep Render Awake

on:
  schedule:
    # GitHub Actions usa UTC. Esta janela cobre 08:40-18:30 em America/Sao_Paulo.
    # O passo "Business window" abaixo faz o corte exato para evitar ping fora do expediente.
    - cron: "*/10 11-21 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-render-awake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Business window
        id: business_window
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime, time
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/Sao_Paulo"))
          starts_at = time(8, 40)
          ends_at = time(18, 30)
          is_weekday = now.weekday() < 5
          is_open = is_weekday and starts_at <= now.time() <= ends_at

          print(f"within={'true' if is_open else 'false'}")
          print(f"now_brt={now:%Y-%m-%d %H:%M:%S %Z}")
          print(f"window={starts_at.strftime('%H:%M')}-{ends_at.strftime('%H:%M')}")
          PY

      - name: Resolve target URL
        if: steps.business_window.outputs.within == 'true' || github.event_name == 'workflow_dispatch'
        id: target
        shell: bash
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          RAW="${RENDER_APP_URL:-https://siocred.onrender.com}"
          RAW="${RAW//$'\r'/}"
          RAW="${RAW//$'\n'/}"
          RAW="${RAW%/}"

          if [[ "$RAW" != http://* && "$RAW" != https://* ]]; then
            RAW="https://$RAW"
          fi

          echo "url=$RAW/health/keepalive" >> "$GITHUB_OUTPUT"

      - name: Ping Render
        if: steps.business_window.outputs.within == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
        run: |
          echo "Business window: ${{ steps.business_window.outputs.window }}"
          echo "Now BRT: ${{ steps.business_window.outputs.now_brt }}"
          echo "Pinging $TARGET_URL"
          curl -fsS --max-time 90 --retry 3 --retry-delay 10 --retry-all-errors "$TARGET_URL"

      - name: Skip outside business hours
        if: steps.business_window.outputs.within != 'true' && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          echo "Fora do horario configurado: ${{ steps.business_window.outputs.now_brt }}"
          echo "Janela ativa: ${{ steps.business_window.outputs.window }}"
