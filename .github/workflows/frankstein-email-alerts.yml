name: Frankstein Email Alerts

on:
  schedule:
    # GitHub Actions usa UTC. A janela abaixo cobre 08:35-18:30 em America/Sao_Paulo.
    - cron: "*/5 11-21 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frankstein-email-alerts-${{ github.ref }}
  cancel-in-progress: true

jobs:
  process-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Business window
        id: business_window
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime, time
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/Sao_Paulo"))
          starts_at = time(8, 35)
          ends_at = time(18, 30)
          is_open = starts_at <= now.time() <= ends_at

          print(f"within={'true' if is_open else 'false'}")
          print(f"now_brt={now:%Y-%m-%d %H:%M:%S %Z}")
          print(f"window={starts_at.strftime('%H:%M')}-{ends_at.strftime('%H:%M')}")
          PY

      - name: Resolve target URL
        if: steps.business_window.outputs.within == 'true' || github.event_name == 'workflow_dispatch'
        id: target
        shell: bash
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          RAW="${RENDER_APP_URL:-https://siocred.onrender.com}"
          RAW="${RAW//$'\r'/}"
          RAW="${RAW//$'\n'/}"
          RAW="${RAW%/}"

          if [[ "$RAW" != http://* && "$RAW" != https://* ]]; then
            RAW="https://$RAW"
          fi

          echo "url=$RAW/app/api/frankstein/agenda/email-alertas/processar" >> "$GITHUB_OUTPUT"

      - name: Process Frankstein email alerts
        if: steps.business_window.outputs.within == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
          SIOCRED_EMAIL_ALERT_TOKEN: ${{ secrets.SIOCRED_EMAIL_ALERT_TOKEN }}
        run: |
          echo "Business window: ${{ steps.business_window.outputs.window }}"
          echo "Now BRT: ${{ steps.business_window.outputs.now_brt }}"
          curl -fsS --max-time 120 --retry 2 --retry-delay 10 --retry-all-errors \
            -X POST \
            -H "x-siocred-alert-token: ${SIOCRED_EMAIL_ALERT_TOKEN}" \
            "$TARGET_URL"

      - name: Skip outside business hours
        if: steps.business_window.outputs.within != 'true' && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          echo "Fora do horario configurado: ${{ steps.business_window.outputs.now_brt }}"
          echo "Janela ativa: ${{ steps.business_window.outputs.window }}"
